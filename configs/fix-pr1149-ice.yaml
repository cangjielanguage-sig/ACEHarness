workflow:
  name: "PR#1149 ICE: try-finally 局部函数同名 use-after-free"
  description: >
    修复 PR #1149 feat: free chir func body in codegen 在 O2 模式下引入的 ICE。
    问题：try-finally 块中局部函数与外层函数同名时，FreeMemoryInFunc 删除了 BlockGroup（作为 map key），但
    Func::body (FuncBody.body) 仍持有原始指针， 导致 use-after-free / dangling pointer。
  mode: state-machine
  maxTransitions: 30
  states:
    - name: 复现确认
      description: 构造最小复现用例，在 O2 模式下确认 ICE 可稳定触发
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: 构造最小复现用例
          agent: compiler_issue-reproducer
          task: >
            针对 PR #1149 引入的 ICE 构造最小可复现用例。


            复现目标代码： ``` main() {
                func foo(): Unit { foo() }
                try {
                    func foo(): Unit { }
                } finally { }
                return 0
            } ```


            请在 ../cangjie_compiler_dts792 目录下：

            1. 创建 /tmp/pr1149_ice_repro.cj，内容为上述代码

            2. 确认 cjc 编译器已构建：
               source ../cangjie_compiler_dts792/output/envsetup.sh
               ls ../cangjie_compiler_dts792/output/bin/cjc

            3. 用 O2 模式编译：cjc -O2 /tmp/pr1149_ice_repro.cj -o
            /tmp/pr1149_ice_repro
               记录完整 stdout + stderr

            4. 如果有 .chirtxt 或 .chir 文件 dump，确认其中有相关信息

            5. 尝试 O0 模式编译（cjc -O0）作为对比：
               记录是否无 ICE（只是编译结果是否正确）

            6. 同时测试简化版本（无 try-finally）：
               ```
               main() {
                   func foo(): Unit { foo() }
                   func foo(): Unit { }  // shadow outer foo
                   return 0
               }
               ```
               确认是否触发同样 ICE

            输出：完整源码 + O2 编译输出 + O0 对比 + 简化版本结果
          role: defender
          skills:
            - use-knowledge-base
        - name: 复现裁判
          agent: compiler_fix-judge
          task: >
            评审复现结果：

            1. O2 模式是否稳定触发 ICE？

            2. 简化版本（无 try-finally）是否也触发 ICE？

            3. O0 模式是否正常？


            如果未能复现，说明可能需要更多上下文条件。

            需要确认是否需要完整的 try-finally 结构才能触发。


            输出 JSON：

            {"verdict":"pass|fail","next_state":"根因分析","summary":"复现结论，含 ICE
            触发条件"}
          role: judge
      transitions:
        - to: 根因分析
          condition:
            verdict: pass
          priority: 1
          label: ICE 已复现
        - to: 复现确认
          condition:
            verdict: fail
          priority: 2
          label: 未能复现，重试
    - name: 根因分析
      description: 精确分析 FreeMemoryInFunc 的双重所有权问题
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 深度代码路径分析
          agent: compiler_code-hunter
          task: >
            精确分析 PR #1149 引入的 ICE 根因。源码位于 ../cangjie_compiler_dts792/src/。


            已知根因概要（需验证）：

            1. PR #1149 在 EmitFunctionIR() 中添加了 FreeMemoryInFunc() 调用，
               每次函数 codegen 完成后析构函数体内存。

            2. CHIRBuilder::CreateBlockGroup 将 BlockGroup* 存入
            allocatedPtrInFuncOrLambda
               作为 map key。

            3. CHIRContext::FreeMemoryInFunc() 删除 key 所指的 BlockGroup，
               但 Func::body (FuncBody.body) 仍持有该 BlockGroup* 裸指针 → 悬空指针。

            4. FuncBody::body 是独立对象（Value.h L898: FuncBody body;），
               不随 BlockGroup 一起析构。

            5. FreeMemoryInFunc 执行 it->second.clear() 后未 erase map entry，
               DeleteAllocatedTys 遍历时会再次尝试删除同一 BlockGroup → 双重删除。


            请验证以下具体问题：

            1. 读取 src/CHIR/IR/CHIRBuilder.cpp 的 CreateBlockGroup 方法（第41-46行附近）
               确认 StoreAllocatedPtrInFuncOrLambda(*blockGroup) 确实被调用

            2. 读取 src/CHIR/IR/CHIRContext.cpp 的 FreeMemoryInFunc 方法（第236-246行）
               确认 map entry 未被 erase

            3. 读取 include/cangjie/CHIR/IR/Value/Value.h 第626-648行
               确认 FuncBody::body 是 BlockGroup* raw pointer

            4. 读取 include/cangjie/CHIR/IR/Value/Value.h 第896-904行
               确认 Func::body 是 FuncBody 类内嵌成员（而非指针）

            5. 读取 src/CodeGen/EmitFunctionIR.cpp 第233-238行
               确认每次 EmitFunctionIR 后调用 FreeMemoryInFunc

            6. 分析为什么 try-finally 结构是触发条件：
               - 在有 try-finally 时，CreateBlockGroup 何时被调用？
               - 局部函数 foo 在 try-finally 内 shadow 外层 foo 的完整 CHIR 生成流程是什么？
               - 确认是否 inner foo 和 outer foo 共享同一个 BlockGroup 指针

            输出：根因验证报告，含每处代码的精确文件:行号、代码片段、验证结论
          role: defender
          skills:
            - use-knowledge-base
        - name: 根因挑战审查
          agent: compiler_code-auditor
          task: |
            独立审查根因分析，验证以下假设：

            1. 假设 inner foo 和 outer foo 在 CHIR 层共享 BlockGroup 指针
               - 验证：CHIRBuilder::CreateBlockGroup 对同名函数是否返回同一个 BlockGroup？
               - 还是两个不同的 BlockGroup？如果是，悬空指针如何产生？

            2. 假设 try-finally 是必要触发条件
               - 验证：没有 try-finally 时，FreeMemoryInFunc 是否也会导致问题？
               - 验证：TranslateTryExpr.cpp 中是否有特殊的 BlockGroup 创建逻辑？

            3. 假设关键在于 FuncBody::body 和 allocatedPtrInFuncOrLambda 的双重所有权
               - 验证：如果 inner foo 和 outer foo 是完全独立的 Func 对象，
                 FreeMemoryInFunc 是否只删除 inner foo 的 BlockGroup 而不影响 outer foo？

            4. 检查是否有其他可能导致 ICE 的路径：
               - Lambda 表达式的 BlockGroup 是否也会被 FreeMemoryInFunc 错误删除？
               - ClosureConversion 后的嵌套函数是否受影响？

            输出：独立验证报告，确认或修正根因假设
          role: attacker
          skills:
            - use-knowledge-base
        - name: 根因分析裁判
          agent: compiler_fix-judge
          task: |
            综合两个 Agent 的分析，裁定根因是否准确：

            1. inner foo 和 outer foo 的 BlockGroup 关系是否已明确？
            2. 为什么 try-finally 结构是触发条件？
            3. 双重所有权问题是否成立？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"修复方案设计","summary":"根因结论，含精确文件路径和行号"}
          role: judge
      transitions:
        - to: 修复方案设计
          condition:
            verdict: pass
          priority: 1
          label: 根因确认
        - to: 根因分析
          condition:
            verdict: fail
          priority: 2
          label: 根因不明确
    - name: 修复方案设计
      description: 设计最小侵入性修复方案
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 设计修复方案
          agent: compiler_fix-architect
          task: >
            基于根因分析，设计最小侵入性修复方案。

            根因核心：BlockGroup 同时被 allocatedPtrInFuncOrLambda (map key) 和
            FuncBody::body (raw pointer) 持有。FreeMemoryInFunc 删除了 BlockGroup， 但
            Func::body 仍指向已删除的内存。

            修复方案 A（推荐）：CreateBlockGroup 不存自身指针 - CHIRBuilder::CreateBlockGroup
            中删除 StoreAllocatedPtrInFuncOrLambda(*blockGroup) - FreeMemoryInFunc
            增加 allocatedPtrInFuncOrLambda.erase(it)

            修复方案 B（备选）：FreeMemoryInFunc 不删 BlockGroup - FreeMemoryInFunc 只删
            contents，不 delete BlockGroup* - 依赖 Func 析构时顺带清理

            请分析： 1. 方案 A 和 B 的优劣 2. 是否有其他隐患（如 Lambda 的 BlockGroup 也会被错误管理） 3.
            修复后 DeleteAllocatedTys 的行为是否正确 4. 修复对性能的影响（是否仍有提前释放内存的效果）

            输出：方案对比分析 + 推荐方案 + 风险评估
          role: defender
          skills:
            - use-knowledge-base
        - name: 方案安全性审查
          agent: compiler_design-breaker
          task: >
            对修复方案进行安全性审查：


            1. 方案 A：CreateBlockGroup 不存自身指针
               - 修复后，BlockGroup 的内存由谁管理？何时释放？
               - Func 析构时，FuncBody::body (BlockGroup*) 是否正确 delete？
               - FuncBody::body 在 Func 类中是内嵌对象（非指针），
                 但它持有 BlockGroup*，这个 BlockGroup 何时 delete？
               - 删除 StoreAllocatedPtrInFuncOrLambda 后，
                 allocatedPtrInFuncOrLambda.find(&funcBody) 是否总是能找到？
                 （可能找不到，因为 key 不在 map 中）
               - 如果 Find 不到，FreeMemoryInFunc 会直接 return，
                 此时 contents (Expressions/LocalVars) 不被 delete → 内存泄漏？

            2. 关键问题：FuncBody::body 是如何初始化的？何时 delete？
               - Func::InitBody(BlockGroup& newBody): body.body = &newBody（直接引用，非 new）
               - FuncBody 是类内嵌成员，BlockGroup* body = nullptr（独立对象）
               - 所以 Func 不"拥有" BlockGroup 的内存！
               - BlockGroup 的所有权完全在 allocatedPtrInFuncOrLambda
               - 删除方案 A 中的 StoreAllocatedPtrInFuncOrLambda → BlockGroup 永不 delete → 内存泄漏

            3. 因此正确方案是方案 B：
               - FreeMemoryInFunc 不删除 BlockGroup*
               - 只删除 map 中记录的 Expressions 和 LocalVars
               - allocatedPtrInFuncOrLambda.erase(it) 防止 DeleteAllocatedTys 重删
               - BlockGroup 的 delete 交给 DeleteAllocatedTys（包结束时）

            4. Lambda 的 BlockGroup 是否有同样问题？


            输出：安全性审查报告，明确正确的修复方案
          role: attacker
          skills:
            - use-knowledge-base
        - name: 方案设计裁判
          agent: compiler_design-judge
          task: |
            综合分析和审查结果，确定最终修复方案：

            1. 方案 A 是否会导致 BlockGroup 内存泄漏？
            2. 方案 B 是否正确？
            3. 修复是否需要改动 CreateBlockGroup？

            最终修复方案应包含：
            1. CHIRContext::FreeMemoryInFunc 的精确修改
            2. 是否需要修改 CreateBlockGroup
            3. DeleteAllocatedTys 是否需要调整

            输出 JSON：
            {"verdict":"pass|fail","next_state":"代码修复实现","summary":"最终修复方案，含精确修改内容"}
          role: judge
      transitions:
        - to: 代码修复实现
          condition:
            verdict: pass
          priority: 1
          label: 方案确认
        - to: 修复方案设计
          condition:
            verdict: fail
          priority: 2
          label: 方案有问题
      requireHumanApproval: true
    - name: 代码修复实现
      description: 按最终方案修改源码并编译验证
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 实现代码修复
          agent: compiler_fix-developer
          task: >
            按照评审通过的修复方案，在 ../cangjie_compiler_dts792 源码中实施修复。


            最终修复方案：

            修复 1：src/CHIR/IR/CHIRContext.cpp — FreeMemoryInFunc - 删除 BlockGroup*
            本身（FreeMemoryInFunc 不再 delete BlockGroup） - 改为 erase map entry 防止
            DeleteAllocatedTys 双重删除 - 只删 contents (Expressions/LocalVars)

            修复 2：确认 CreateBlockGroup 行为 - 检查是否需要删除
            StoreAllocatedPtrInFuncOrLambda(*blockGroup)

            请执行：

            1. 读取 src/CHIR/IR/CHIRContext.cpp 第236-246行（FreeMemoryInFunc） 2. 读取
            src/CHIR/IR/CHIRBuilder.cpp 第41-46行（CreateBlockGroup） 3. 应用精确修改 4.
            使用 build-cangjie 技能重新编译：
               cd ../cangjie_compiler_dts792 && source output/envsetup.sh && cmake --build build --target cjc -j$(nproc)
            5. 编译成功后，运行 /tmp/pr1149_ice_repro.cj：
               cjc -O2 /tmp/pr1149_ice_repro.cj -o /tmp/pr1149_ice_repro
               确认不再 ICE

            输出：修改的完整 diff + 编译结果 + 验证测试输出
          role: defender
          skills:
            - use-knowledge-base
            - build-cangjie
        - name: 代码审计
          agent: compiler_fix-reviewer
          task: |
            审计 fix-developer 的代码修改：

            1. 逐行审查修改，确认逻辑正确性
            2. 检查 FreeMemoryInFunc 修改后：
               - 是否仍然只删 Expressions 和 LocalVars？
               - 是否正确 erase map entry？
               - 是否处理了 Find 不到 entry 的情况？
            3. 确认 DeleteAllocatedTys 中的逻辑是否仍然正确
            4. 验证 Lambda 的 BlockGroup 不会受影响

            输出：代码审计报告
          role: attacker
          skills:
            - use-knowledge-base
        - name: 实现裁判
          agent: compiler_fix-judge
          task: |
            评审代码修复和审计结果：
            1. 编译是否成功？
            2. ICE 是否已修复（O2 编译不再崩溃）？
            3. 代码审计发现的问题是否已修正？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"回归验证","summary":"实现评审结论"}
          role: judge
      transitions:
        - to: 回归验证
          condition:
            verdict: pass
          priority: 1
          label: 实现确认
        - to: 代码修复实现
          condition:
            verdict: fail
          priority: 2
          label: 实现有问题
      requireHumanApproval: true
    - name: 回归验证
      description: 全面验证修复效果，确保无回归
      isInitial: false
      isFinal: false
      position:
        x: 900
        y: 200
      steps:
        - name: 全面回归测试
          agent: compiler_tester
          task: |
            对修复后的 cjc 进行回归验证：

            1. 验证 ICE 修复效果：
               - 运行 /tmp/pr1149_ice_repro.cj（-O2）：确认不再 ICE，编译成功
               - 运行简化版本（无 try-finally）：确认不 ICE
               - 运行 -O0 模式：确认正常编译
               - 运行 -O1 模式：确认正常编译

            2. 核心功能验证：
               - try-finally 基础功能是否正常
               - 局部函数 shadow 功能是否正常
               - 两者的组合是否正常

            3. PR #1149 的目标验证（提前释放内存）：
               - 确认 CHIR 函数翻译后仍然及时析构函数体
               - 确认 CHIR 包的内存管理行为正确

            4. 运行相关单元测试（查找 try-finally、局部函数相关测试）：
               - ../cangjie_compiler_dts792/unittests/ 下相关测试

            输出：完整测试报告
          role: defender
          skills:
            - use-knowledge-base
        - name: 压力测试
          agent: compiler_performance-breaker
          task: |
            对修复进行压力测试和边界探索：

            1. 多重嵌套 try-finally + 局部函数同名：
               ```
               main() {
                   func foo(): Unit { foo() }
                   try {
                       try {
                           func foo(): Unit { foo() }
                       } finally { }
                   } finally { }
                   return 0
               }
               ```

            2. 多个局部函数同名覆盖（不同层级）：
               ```
               main() {
                   func foo(): Unit { foo() }
                   try {
                       func foo(): Unit { }
                       try {
                           func foo(): Unit { foo() }
                       } finally { }
                   } finally { }
                   return 0
               }
               ```

            3. try-catch-finally + 局部函数同名：
               测试 catch 块中的局部函数是否也受影响

            4. Lambda 嵌套在 try-finally 中：
               确认 Lambda 的 BlockGroup 管理不受影响

            输出：压力测试报告，标注是否发现新问题
          role: attacker
          skills:
            - use-knowledge-base
        - name: 最终裁判
          agent: compiler_fix-judge
          task: |
            综合所有验证结果，给出最终裁定：
            1. ICE 是否已修复？
            2. 回归测试是否全部通过？
            3. 压力测试是否发现新问题？
            4. 修复是否达到提交标准？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"验证完成","summary":"最终验证结论"}
          role: judge
      transitions:
        - to: 验证完成
          condition:
            verdict: pass
          priority: 1
          label: 验证通过
        - to: 代码修复实现
          condition:
            verdict: fail
          priority: 2
          label: 验证失败
      requireHumanApproval: false
    - name: 验证完成
      description: 修复完成，生成修复报告和 PR 草稿
      isInitial: false
      isFinal: true
      position:
        x: 1100
        y: 200
      steps:
        - name: 生成修复报告和PR草稿
          agent: documentation-writer
          task: >
            基于整个修复流程，生成完整的修复报告：


            1. 问题描述：PR #1149 引入的 ICE 现象和触发条件

            2. 根因分析：FreeMemoryInFunc 中 BlockGroup 双重所有权问题

            3. 修复方案：精确的代码修改（diff 格式）

            4. 验证结论：所有测试结果

            5. PR 描述草稿（英文，符合 commitlint 格式）：
               fix(codegen): prevent use-after-free in FreeMemoryInFunc

               PR #1149 introduced FreeMemoryInFunc() which deletes BlockGroup
               objects referenced in allocatedPtrInFuncOrLambda map keys. However,
               Func::body (FuncBody.body) also holds a raw pointer to the same
               BlockGroup. When a local function shadows an outer function with
               the same name, the inner function's codegen deletes the shared
               BlockGroup, leaving the outer function's FuncBody::body dangling.
               This causes use-after-free ICE in O2 mode.

               Fix: do not store BlockGroup* in allocatedPtrInFuncOrLambda as its
               contents (Expressions/LocalVars) are already tracked separately.
               The BlockGroup itself is managed by DeleteAllocatedTys at package
               end. Also erase map entry in FreeMemoryInFunc to prevent
               double-delete by DeleteAllocatedTys.

            输出 JSON：

            {"verdict":"pass","next_state":"验证完成","summary":"修复报告已生成"}
          role: defender
      transitions: []
context:
  projectRoot: ../cangjie_compiler_dts792
  requirements: |
    修复 PR #1149 feat: free chir func body in codegen 在 O2 模式下引入的 ICE。

    问题现象：以下代码在 O2 模式编译时触发 ICE（Internal Compiler Error）：
    ```
    main() {
        func foo(): Unit { foo() }
        try {
            func foo(): Unit { }
        } finally { }
        return 0
    }
    ```

    验收标准：
    1. O2 模式下不再 ICE
    2. O0/O1 模式下仍然正常
    3. try-finally 和局部函数功能正常
    4. PR #1149 的内存优化目标仍然有效（提前释放函数体）
    5. 现有测试套件无回归
  codebase: src/CHIR/IR/
  timeoutMinutes: 300
  skills:
    - use-knowledge-base
    - build-cangjie
    - run-cangjie-tests
    - power-gitcode
