workflow:
  name: B-Lite Supervisor 完整测试
  description: 定向测试指名请求、LLM语义路由、人工审查补充信息确认
  mode: state-machine

  states:
    # 场景1: 指名请求 tester（验证带 agent 名称时是否正确路由）
    - name: 场景1-指名请求tester
      description: 验证指明向 tester 要测试策略
      isInitial: true
      isFinal: false
      steps:
        - name: 指名向tester要测试策略
          agent: simple-coder
          task: |
            你需要编写一个 Hello World 程序。但是我需要你向测试agent询问其name，然后将其姓名加到Hello World的输出中。 提问测试agent的姓名。
            收到回答后输出 [PLAN_DONE]。
            例如，如果测试agent的姓名是Alice，那么最终输出应该是：
            Hello World Alice!
            请使用 [NEED_INFO]，后面接上你需要问的问题进行询问，如果你要向某个agent询问问题，你需要说"我需要向测试agent提问：xxx"。
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 场景2-LLM语义路由reviewer
          condition:
            type: always

    # 场景2: LLM 语义路由到 reviewer（避免关键词命中）
    - name: 场景2-LLM语义路由reviewer
      description: 近义词问题路由到 reviewer
      isInitial: false
      isFinal: false
      steps:
        - name: 近义词问题路由到reviewer
          agent: simple-coder
          task: |
            你需要修改当前 Hello World 程序的输出，添加上评审agent的姓名。请先询问评审agent的姓名，然后将其姓名加到Hello World的输出中。提问评审agent的姓名。
            收到回答后输出 [PLAN_DONE]。
            例如，如果评审agent的姓名是Bob，那么最终输出应该是：
            Hello World xxx , Bob!
            注意：你不能直接使用"代码问题"、"审查"、"改进"等关键词来询问评审agent的姓名，否则会被路由到测试agent。
            你需要使用其他近义词，请使用 [NEED_INFO]，后面接上你需要问的问题进行询问，如果你要向某个agent询问问题，你需要在问题前添加该agent的关键词，例如你需要向评审agent询问问题，你需要说"我需要向评审agent提问：xxx"。
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 场景3-人工审查补充信息
          condition:
            type: always

    # 场景3: 人工审查（确认最终输出是否需要补充信息）
    - name: 场景3-人工审查补充信息
      description: 人工审查补充信息确认
      isInitial: false
      isFinal: true
      steps:
        - name: 询问用户是否需要补充信息
          agent: simple-coder
          task: |
            你需要修改当前 Hello World 程序的输出，向人工进行提问是否需要添加人工的姓名，添加到Hello World的输出中。提问用户是否需要添加姓名。
            收到回答后输出 [PLAN_DONE]。
            请使用 [NEED_INFO：human]，后面接上你需要问的问题进行询问，如果你要向某个agent询问问题，你需要在问题前添加该agent的关键词，例如你需要向用户询问问题，你需要说"我需要向用户提问：xxx"。
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions: []

context:
  projectRoot: .
  requirements: |
    实现一个简单的"Hello World"程序。

roles:
  - name: simple-coder
    team: blue
    model: claude-sonnet-4-6
    temperature: 0.7
    capabilities:
      - 编写代码
    systemPrompt: |
      你是一个简单的程序员，负责编写代码。
    keywords:
      - 代码
      - 实现
      - 写
      - 编程
    description: 可以回答代码实现相关问题

  - name: simple-tester
    team: blue
    model: claude-sonnet-4-6
    temperature: 0.7
    capabilities:
      - 测试
    systemPrompt: |
      你是一个简单的测试工程师，负责设计测试用例。
    keywords:
      - 测试
      - 用例
      - 覆盖
      - 验证
      - Bug
    description: 可以回答测试相关问题

  - name: simple-reviewer
    team: blue
    model: claude-sonnet-4-6
    temperature: 0.7
    capabilities:
      - 代码审查
    systemPrompt: |
      你是一个简单的代码审查员，负责审查代码质量。
    keywords:
      - 代码审查
      - 质量
      - 问题
      - 改进
    description: 可以回答代码审查相关问题
