workflow:
  name: OH CangjieDev (状态机)
  description: OpenHarmony OH 仓颉移植（状态机版，支持回退与人工审批）
  mode: state-machine
  maxTransitions: 50
  states:
    - name: 分析Gap
      description: Gap 分析与分批建议
      requireHumanApproval: true
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: Gap分析
          agent: oh-cangjie-analyst
          role: defender
          task: >
            依据 context.requirements 中给定的 ArkTS API 需求， 使用
            ohos-cangjie-analyst-skill 执行 Gap 分析与源码定位， 输出结构化分析报告和分批建议，并将报告写入
            .ace-outputs/{runId}/Gap_分析.md。
          skills:
            - ohos-cangjie-analyst-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 架构设计
          condition:
            verdict: pass
          priority: 1
          label: 分析通过，进入设计
        - to: 架构设计
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件通过
    - name: 架构设计
      description: 输出架构文档
      requireHumanApproval: true
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 架构设计
          agent: oh-cangjie-architect
          role: defender
          task: >
            在「Gap分析」产出的分析报告和分批建议基础上，使用 ohos-cangjie-architect-skill 为当前批次 API
            输出架构文档。

            重要工作方式要求：
            1. 不要重复读取源码文件，直接基于前置步骤结论中的 Gap 分析报告进行架构设计。
            2. 使用 Bash 工具将文档写入文件，不要使用 Write 工具（因为文档内容太大会导致 Write 参数被截断）。
               示例：cat << 'ARCH_EOF' > /path/to/file.md
               文档内容...
               ARCH_EOF
            3. 输出路径：.ace-outputs/{runId}/架构设计.md
          skills:
            - ohos-cangjie-architect-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 实现编码
          condition:
            verdict: pass
          priority: 1
          label: 架构通过，进入实现
        - to: 实现编码
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件通过
        - to: 分析Gap
          condition:
            verdict: fail
          priority: 3
          label: 需重新分析
    - name: 实现编码
      description: CJ + C++ FFI 实现 + 编译验证
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 编码实现
          agent: oh-cangjie-coder
          role: defender
          task: >
            依据「架构设计」产出的架构文档， 使用 ohos-cangjie-coder-skill 实现仓颉层与 C++ FFI 层， 将说明写入
            .ace-outputs/{runId}/编码实现.md。
          skills:
            - ohos-cangjie-coder-skill
        - name: 编译验证
          agent: oh-cangjie-reviewer
          role: judge
          task: >
            对「编码实现」产出的 CJ/C++ FFI 代码执行编译验证： 1. C++ FFI 编译（./build.sh
            --build-target <cj_xxx_ffi_target>） 2. 仓颉 wrapper 编译（./build.sh
            --build-target <wrapper_dir_name>） 3. 使用 llvm-nm -D 确认 FFI 符号已正确导出
            只验证编译是否通过，不做完整代码审查。 在回复末尾输出 JSON 块： ```json {
              "verdict": "pass|fail",
              "issues": [{"type": "implementation", "severity": "critical", "description": "..."}],
              "summary": "编译验证结论"
            } ``` pass 表示编译通过，fail 表示编译失败（附错误信息）。
          preCommands:
            # 在 projectRoot (/home/wujizhou/worksapce) 下自动执行实际构建命令和错误日志读取
            - ./build.sh --product-name rk3568 --build-target cj_file_fs_ffi
            - ./build.sh --product-name rk3568 --build-target file_api
            - cat out/rk3568/error.log 2>/dev/null | head -80
          skills:
            - ohos-cangjie-reviewer-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 红军审查
          condition:
            verdict: pass
          priority: 1
          label: 编译通过，进入红军审查
        - to: 红军审查
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件进入审查
        - to: 实现编码
          condition:
            verdict: fail
          priority: 3
          label: 编译失败，回退修复
    - name: 红军审查
      description: 按审查清单检查实现，决定通过或回退
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 代码审查(红军)
          agent: oh-cangjie-reviewer
          role: attacker
          task: >
            对上一步「编码实现」产出的 CJ/FFI 代码，使用 ohos-cangjie-reviewer-skill
            按审查清单逐项检查（FFI 命名、NAPI 对齐、文件组织、仓颉约束、构建配置等），列出问题与修复建议，不修改代码，
            将审查报告写入 .ace-outputs/{runId}/代码审查_红军.md。

            ⚠️ 编译验证为必须步骤，不可跳过：
            1. 在 projectRoot 目录下执行 C++ FFI 编译：./build.sh --product-name rk3568 --build-target <cj_xxx_ffi_target>
            2. 执行仓颉 Wrapper 编译：./build.sh --product-name rk3568 --build-target <wrapper_dir_name>
            3. 用 llvm-nm -D 验证 FFI 符号导出
            构建工具链已就绪，必须实际执行上述命令并记录真实结果，禁止以"无构建环境"为由跳过。
          skills:
            - ohos-cangjie-reviewer-skill
        - name: 评审实现
          agent: code-judge
          role: judge
          task: >
            根据「代码审查(红军)」的审查报告，裁决本批实现是否通过。 在回复末尾输出以下 JSON 块（用 ```json 包裹）：
            ```json {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "最终验证|实现编码",
              "issues": [{"type": "implementation|design", "severity": "critical|major|minor", "description": "..."}],
              "summary": "一句话结论"
            } ``` pass/conditional_pass 时 next_state 填「最终验证」，fail 时填「实现编码」。
          skills:
            - ohos-cangjie-reviewer-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 最终验证
          condition:
            verdict: pass
          priority: 1
          label: 审查通过
        - to: 最终验证
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件通过
        - to: 实现编码
          condition:
            verdict: fail
          priority: 3
          label: 回退实现修复
    - name: 最终验证
      description: 完整审查与编译验证，发布门禁
      requireHumanApproval: true
      isInitial: false
      isFinal: false
      position:
        x: 900
        y: 200
      steps:
        - name: 审查与编译
          agent: oh-cangjie-reviewer
          task: >
            汇总前序产出，使用 ohos-cangjie-reviewer-skill 对本轮变更做完整审查与编译验证，
            输出最终审查报告（通过/有条件通过/不通过），写入 .ace-outputs/{runId}/最终审查与编译验证.md。
          skills:
            - ohos-cangjie-reviewer-skill
        - name: 验收裁决
          agent: code-judge
          role: judge
          task: >
            根据「审查与编译」的最终报告，裁决是否可结束本次工作流。 在回复末尾输出以下 JSON 块（用 ```json 包裹）： ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "完成|实现编码",
              "issues": [],
              "summary": "一句话结论"
            } ``` pass 时 next_state 填「完成」，fail 时填「实现编码」。
          skills:
            - ohos-cangjie-reviewer-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      transitions:
        - to: 完成
          condition:
            verdict: pass
          priority: 1
          label: 验收通过
        - to: 完成
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件完成
        - to: 实现编码
          condition:
            verdict: fail
          priority: 3
          label: 回退修复后重验
    - name: 完成
      description: 工作流结束
      isInitial: false
      isFinal: true
      position:
        x: 1100
        y: 200
      steps:
        - name: 产出汇总
          agent: oh-cangjie-architect
          task: >
            基于本 run 各步骤产出，生成一份简短总结（Gap 报告、架构文档、实现与审查结论的路径与要点）， 写入
            .ace-outputs/{runId}/产出汇总.md。不新增技术内容，仅汇总引用。
          skills: []
      transitions: []
context:
  projectRoot: /home/wujizhou/worksapce
  requirements: 请帮我分析ohos.file.fs这个对应ArkTS的鸿蒙API接口，然后开发对应的仓颉接口，并按照优先级排序，选取5个方法进行开发
  timeoutMinutes: 300
  skills: []
