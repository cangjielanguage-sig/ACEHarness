workflow:
  name: "管道运算符重载函数 ICE: |> + lambda + 重载解析的 SIGSEGV"
  description: >
    修复仓颉编译器在管道运算符 |> 配合尾随 lambda 调用重载函数时触发的 ICE。 问题代码： 

    ```cangjie

    import std.collection.map

    func test(input: Array<Float64>) { input |> map { p => f(p + 1.0) } }

    func f(float: Float64) { float }

    func f(int: Int64) { int }

    main() { 0 } 

    ```已知能通过编译的对照用例（Array<Float64> + 显式类型标注）：  `func test(input: Array<Float64>)
    { input |> map { p: Float64 => f(p + 1.0) }}`

    错误：Windows unexpected exception code (11) / SIGSEGV，Error Code: 6
  mode: state-machine
  maxTransitions: 30
  states:
    - name: 复现确认
      description: 构造最小复现用例，确认 ICE 可稳定触发
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: 构造最小复现用例
          agent: compiler_issue-reproducer
          task: >
            针对管道运算符 + 重载函数 ICE 构造最小可复现用例，验证 ICE 11 (SIGSEGV) 可稳定触发。

            原始问题代码： ```cangjie

            import std.collection.map

            func test(input: Array<Float64>) { input |> map { p => f(p + 1.0) }
            }

            func f(float: Float64) { float }

            func f(int: Int64) { int }

            main() { 0 } 

            ```

            请在 ../cangjie_compiler 目录下：

            1. 创建 /tmp/pipe_overload_ice_repro.cj，内容为上述代码

            2. 确认 cjc 编译器已构建：
               source ../cangjie_compiler/output/envsetup.sh
               ls ../cangjie_compiler/output/bin/cjc

            3. 编译测试：
               cjc /tmp/pipe_overload_ice_repro.cj -o /tmp/pipe_overload_ice_repro
               记录完整 stdout + stderr
               确认是否触发 ICE (code 11 / SIGSEGV)

            4. 已知能通过编译的对照用例（必须验证）：
               ```
            import std.collection.map

            func test(input: Array<Float64>) { input |> map { p: Float64 => f(p
            + 1.0) } }

            func f(float: Float64) { float }

            func f(int: Int64) { int }

            main() { 0 } 
               ```
               确认此用例确实能通过编译

            5. 尝试不同变体确认触发条件（需包含以下情况）：
               - 去掉 |> 管道运算符，改为普通函数调用 → 是否正常
               - 去掉重载（只保留一个 f）→ 是否正常
               - 去掉尾随 lambda，改为显式传参 → 是否正常
               - 去掉 p + 1.0 的隐式类型转换 → 是否正常
               - 只保留 |> 但不用 lambda → 是否正常
               - Array<Int64> 改为 Array<Float64> 但不标注 lambda 参数类型 → 是否正常
               - Array<Int64> + 显式标注 lambda 参数类型 p: Int64 → 是否正常

            6. 同时在 Linux 环境下测试确认 SIGSEGV 是否稳定

            输出：完整源码 + 编译输出 + 变体测试结果，确认 ICE 触发条件
          role: attacker
          skills:
            - cangjie_compiler_knowledge
        - name: 复现裁判
          agent: compiler_fix-judge
          task: >
            评审复现结果，确认 ICE 可稳定触发。


            1. 原始代码是否触发 ICE？


            2. 通过变体测试，确定触发 ICE 的充分必要条件：
               - |> 管道运算符是否必须？
               - 尾随 lambda 是否必须？
               - 函数重载 f(Float64)/f(Int64) 是否必须？
               - p + 1.0 的隐式类型转换是否必须？
               - lambda 参数类型未标注（需推断）是否是关键因素？
               - Array<Int64> vs Array<Float64> 的差异是否是关键因素？

            3. 已知对照：Array<Float64> + 显式标注 p: Float64 能通过，
               说明问题可能在 lambda 参数类型推断 + 重载解析的交叉路径上。

            输出 JSON：

            {"verdict":"pass|fail","next_state":"根因分析","summary":"复现结论，含 ICE
            触发充分必要条件"}
          role: judge
          skills:
            - cangjie_compiler_knowledge
      transitions:
        - to: 根因分析
          condition:
            verdict: pass
          priority: 1
          label: ICE 已复现
        - to: 复现确认
          condition:
            verdict: fail
          priority: 2
          label: 未能复现，重试
    - name: 根因分析
      description: 定位管道运算符 + 重载解析中的空指针/野指针解引用
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 深度代码路径分析
          agent: compiler_code-hunter
          task: >
            精确分析管道运算符重载函数 ICE 根因。源码位于 ../cangjie_compiler/src/。

            已知线索： 1. |> 管道运算符将 input 作为第一个参数传给右侧表达式 2. 右侧是尾随 lambda：map { p =>
            f(p + 1.0) } 3. lambda 内调用重载函数 f 4. 重载解析需要在 f(Float64) 和 f(Int64)
            之间选择 5. 关键对照：Array<Float64> + 显式标注 p: Float64 能通过编译，
               说明当 lambda 参数类型需要从 Array<Int64> 推断且未显式标注时，
               重载解析路径中可能存在空指针/野指针

            请重点分析以下源码路径：

            1. 管道运算符 |> 的语法展开和语义处理
               - 搜索 PipeExpression / PipeOperator 相关代码
               - 确认 |> 如何将左侧表达式注入右侧调用

            2. 尾随 lambda 的处理
               - 搜索 TrailingLambda / TrailingClosure 相关代码
               - 确认 map { ... } 如何展开为 map(input, { ... })

            3. 重载解析路径
               - 搜索 OverloadResolution / FunctionOverload 相关代码
               - 确认 f(p + 1.0) 在 lambda 上下文中如何解析重载

            4. 类型推断路径
               - lambda 参数 p 的类型推断（从 Array<Int64> 推断为 Int64）
               - p + 1.0 的类型推断（Int64 + Float64 → Float64？）
               - 重载选择时的类型匹配

            5. 定位崩溃点
               - 使用 GDB/LLDB 或代码审查定位 SIGSEGV 的精确位置
               - 确认是空指针解引用还是野指针

            输出：精确的崩溃代码路径 + 根因分析 + 涉及的源文件和行号
          role: attacker
          skills:
            - cangjie_compiler_knowledge
        - name: 根因审查
          agent: compiler_code-auditor
          task: >
            审查代码路径分析结果，挑战根因结论。

            1. 崩溃点是否准确定位？是空指针还是野指针？ 2. 管道运算符展开后的 AST 是否正确？ 3. 尾随 lambda
            在管道运算符上下文中的展开是否有特殊路径？ 4. 重载解析在 lambda 内部是否有不同的处理逻辑？ 5.
            类型推断链是否完整（Array<Int64> → Int64 → Float64 → 重载选择）？

            输出：审查意见 + 是否同意根因结论
          role: judge
          skills:
            - cangjie_compiler_knowledge
        - name: 根因裁判
          agent: compiler_fix-judge
          task: |
            综合代码路径分析和审查意见，判定根因。

            1. 崩溃点是否明确？
            2. 根因是否清晰（空指针/野指针/逻辑错误）？
            3. 修复方向是否明确？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"修复实现","summary":"根因判定结论"}
          role: judge
      transitions:
        - to: 修复实现
          condition:
            verdict: pass
          priority: 1
          label: 根因已定位
        - to: 根因分析
          condition:
            verdict: fail
          priority: 2
          label: 根因不明确，继续分析
    - name: 修复实现
      description: 设计并实施修复方案
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 设计修复方案
          agent: compiler_fix-architect
          task: |
            基于根因分析结果，设计最小化修复方案。
            核心原则： - 仅修改导致 ICE 的根因代码，不做防御性修改 - 不添加与修复无关的注释 - 修改范围越小越好
            要求： 1. 精确定位需要修改的源文件和函数 2. 描述修改逻辑（伪代码级别） 3. 考虑边界情况：
               - 管道运算符 + 非重载函数（应正常工作）
               - 管道运算符 + 重载函数但无类型转换（应正常工作）
               - 普通调用 + 重载函数（不应受影响）
               - 嵌套管道运算符
            4. 评估修复的影响范围
            输出：修复方案设计文档
          role: defender
          skills:
            - cangjie_compiler_knowledge
        - name: 实施修复
          agent: compiler_fix-developer
          task: >
            按照修复方案实施代码修改。

            核心原则： - 仅做最小化的根因修改，不做防御性修改 - 不添加与业务无关的注释 - 代码风格与周围代码保持一致

            要求： 1. 在 ../cangjie_compiler 目录下修改源码 2. 修改后重新构建编译器：
               cd ../cangjie_compiler && python3 build.py
            3. 用复现用例验证修复：
               source ../cangjie_compiler/output/envsetup.sh
               cjc /tmp/pipe_overload_ice_repro.cj -o /tmp/pipe_overload_ice_repro
            4. 确认不再触发 ICE 5. 输出修改的 diff

            输出：修改的文件列表 + diff + 编译验证结果
          role: defender
          skills:
            - build-cangjie
            - cangjie_compiler_knowledge
        - name: 修复裁判
          agent: compiler_fix-judge
          task: |
            评审修复实现。

            1. 修复是否精确针对根因？
            2. 是否引入新的问题？
            3. 复现用例是否通过？
            4. 代码质量是否合格？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"验证测试","summary":"修复评审结论"}
          role: judge
      transitions:
        - to: 验证测试
          condition:
            verdict: pass
          priority: 1
          label: 修复已实现
        - to: 修复实现
          condition:
            verdict: fail
          priority: 2
          label: 修复不合格，重新实现
      requireHumanApproval: true
    - name: 验证测试
      description: 回归测试 + 压力测试确认修复质量
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 回归与压力测试
          agent: compiler_tester
          task: >
            对修复后的编译器进行全面验证。

            0. 在 ../cangjie_test 中补充 LLT 测试用例：
               - 创建针对此 ICE 的测试用例文件
               - 包含原始 ICE 触发代码（确认不再崩溃）
               - 包含已知通过的对照用例
               - 包含关键变体用例（覆盖触发条件边界）

            1. 原始复现用例验证：
               source ../cangjie_compiler/output/envsetup.sh
               cjc /tmp/pipe_overload_ice_repro.cj -o /tmp/pipe_overload_ice_repro
               确认不再 ICE

            2. 变体测试（确认修复覆盖所有触发路径）：
               - |> 管道运算符 + 重载函数 + 不同类型转换组合
               - |> 管道运算符 + 尾随 lambda + 多参数重载
               - 嵌套管道运算符 + 重载
               - 链式管道运算符 + 重载
               - |> 管道运算符 + 泛型函数重载

            3. 正常功能回归测试：
               - 普通管道运算符用法（无重载）
               - 普通函数重载（无管道运算符）
               - 尾随 lambda 的正常用法
               - 运行现有测试套件

            4. 压力测试：
               - 大量重载函数 + 管道运算符组合
               - 深层嵌套 lambda + 管道运算符
               - 复杂类型推断场景

            输出：所有测试结果汇总
          role: defender
          skills:
            - build-cangjie
            - run-cangjie-tests
            - cangjie_compiler_knowledge
        - name: 测试裁判
          agent: compiler_fix-judge
          task: |
            评审测试结果。

            1. 原始复现用例是否通过？
            2. 所有变体测试是否通过？
            3. 回归测试是否有失败？
            4. 压力测试是否有新问题？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"验证完成","summary":"测试评审结论"}
          role: judge
      transitions:
        - to: 验证完成
          condition:
            verdict: pass
          priority: 1
          label: 测试全部通过
        - to: 修复实现
          condition:
            verdict: fail
          priority: 2
          label: 测试失败，回退修复
    - name: 验证完成
      description: 生成修复报告，流程结束
      isInitial: false
      isFinal: true
      position:
        x: 900
        y: 200
      steps:
        - name: 生成修复报告
          agent: compiler_documentation-writer
          task: |
            基于整个修复流程，生成完整的修复报告：
            1. 问题描述：管道运算符 + 重载函数 ICE 现象和触发条件
            2. 根因分析：崩溃的精确代码路径和原因
            3. 修复方案：精确的代码修改（diff 格式）
            4. 验证结论：所有测试结果
            输出 JSON： {"verdict":"pass","next_state":"验证完成","summary":"修复报告已生成"}
          role: defender
      transitions: []
context:
  projectRoot: ../cangjie_compiler
  requirements: |-
    任务：修复仓颉编译器在管道运算符 |> 配合尾随 lambda 调用重载函数时触发的 ICE。
    问题现象：以下代码在编译时触发 ICE (Internal Compiler Error)， Windows 环境下错误码 11 (SIGSEGV)：

    注意复现务必使用以下代码：
    ```cangjie
    import std.collection.map
    func test(input: Array<Float64>) { input |> map { p => f(p + 1.0) } }
    func f(float: Float64) { float }
    func f(int: Int64) { int }
    main() { 0 } 
    ```

    关键特征： - 管道运算符 |> 将 input 传给 map - 尾随 lambda { p => f(p + 1.0) } 作为 map 的参数 - lambda 内调用重载函数 f，重载解析需要在 f(Float64) 和 f(Int64) 之间选择
    已知能通过编译的对照用例（Array<Float64> + 显式类型标注）： `func test(input: Array<Float64>) { input |> map { p: Float64 => f(p + 1.0) }}`

    修复原则： - 仅做最小化的根因修改，不做防御性修改 - 不添加与业务无关的注释 - 在 ../cangjie_test 补充 LLT 测试用例
    验收标准：
     1. 上述代码不再 ICE，编译通过
     2. 管道运算符的正常功能不受影响
     3. 函数重载的正常功能不受影响
     4. 现有测试套件无回归
     5. 压力测试无新问题
     6. ../cangjie_test 中已补充 LLT 测试用例
    注意，cangjie语言要求二元操作符两边的类型必须是一致的，所以应该能自动推导出p的类型，而不需要做类型标注。注意，cangjie语言要求二元操作符两边的类型必须是一致的，所以应该能自动推导出p的类型，而不需要做类型标注。注意，需要保证最终修复后不加类型标注也能编过，不能改变语义行为，不一定要在崩溃点修复，不要加防御性代码，修复根因
  codebase: src/frontend/
  testRoot: ../cangjie_test
  timeoutMinutes: 300
  skills:
    - build-cangjie
    - run-cangjie-tests
    - power-gitcode
    - cangjie_compiler_knowledge
