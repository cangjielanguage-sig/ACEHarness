workflow:
  name: AST结束释放内存
  description: 设计 → 实施 → 测试 → 优化
  phases:
    - name: 设计阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: all_resolved
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 提出设计方案
          agent: architect
          task: 根据需求设计技术方案，提供 2-3 个备选方案
          role: defender
        - name: 攻击设计方案
          agent: design-breaker
          task: 分析设计方案，找出所有可能的缺陷和风险
          type: adversarial
          role: attacker
        - name: 评审设计方案
          agent: design-judge
          task: 评估设计方案和发现的问题，给出决策建议
          role: judge
      checkpoint:
        name: 设计方案审批
        message: 请审查设计方案和发现的问题，决定是否进入实施阶段
    - name: 实施阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: no_new_bugs_3_rounds
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 编写代码
          agent: developer
          task: 根据设计方案实现代码
          role: defender
        - name: 代码审查
          agent: code-hunter
          task: 审查代码，发现潜在的漏洞和问题
          type: adversarial
          role: attacker
        - name: 验证修复
          agent: code-judge
          task: 验证代码修复的有效性
          role: judge
      checkpoint:
        name: 代码实现审查
        message: 请审查代码实现和修复情况，决定是否进入测试阶段
    - name: 测试阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: no_new_bugs_3_rounds
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 功能测试
          agent: tester
          task: 编写和执行功能测试用例
          role: defender
        - name: 压力测试
          agent: stress-tester
          task: 执行极限场景和压力测试
          type: adversarial
          role: attacker
        - name: 代码审计
          agent: code-auditor
          task: 审计代码是否符合编码规范
          role: judge
      checkpoint:
        name: 测试结果验收
        message: 请审查测试结果，决定是否进入优化阶段
    - name: 优化阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: no_new_bugs_3_rounds
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 性能优化
          agent: developer
          task: 优化性能瓶颈
          role: defender
        - name: 性能退化测试
          agent: performance-breaker
          task: 寻找性能退化场景
          type: adversarial
          role: attacker
        - name: 性能仲裁
          agent: performance-judge
          task: 验证性能提升的真实性
          role: judge
      checkpoint:
        name: 性能优化决策
        message: 请审查性能优化结果，决定是否完成工作流
context:
  projectRoot: ../cangjie_compiler
  requirements: AST 阶段结束后，释放该阶段使用的内存
  codebase: ../cangjie_compiler/src
  timeoutMinutes: 30
judgeConfig:
  regressionThreshold: 0.1
