workflow:
  name: MarkitAstToTypst
  description: >
    为 markit/markit 解析器新增 ToTypst 接口，并为所有相关 AST 节点实现 toTypst，
    同时补充测试与回归验证，行为模式参考既有 ToHtml 和 ToMarkdownString 的稳定实现。
  mode: state-machine
  maxTransitions: 24
  states:
    - name: 接口设计
      description: 明确 ToTypst 接口形态、节点覆盖范围和输出规则
      isInitial: true
      isFinal: false
      requireHumanApproval: true
      position:
        x: 120
        y: 220
      steps:
        - name: 设计 ToTypst 接口方案
          agent: architect
          role: defender
          task: |
            在 /Users/sundaiyue/Documents/markit 工作区内设计 ToTypst 接口落地方案，目标是让 markit/markit 解析器具备与 ToHtml、ToMarkdownString 对齐的第三种稳定输出能力。

            必须完成：
            1. 梳理现有 ToHtml、ToMarkdownString 的接口定义、挂载位置、调用路径和复用模式。
            2. 明确 ToTypst 应该新增为独立接口、trait、typeclass 或其他项目既有抽象形式，说明选择理由。
            3. 盘点所有相关 AST 节点，输出必须实现 toTypst 的节点清单，并标记可能复用公共逻辑的节点。
            4. 定义输出规则：空白、换行、嵌套结构、转义、块级/行内语义、边界输入处理。
            5. 说明迁移策略，确保新增能力不破坏 ToHtml 与 ToMarkdownString 的既有行为。

            输出要求：
            - 设计方案文档
            - 待实现节点清单
            - 风险清单
            - 供裁判使用的 JSON：
              {"verdict":"pass|fail","next_state":"实现落地","summary":"设计结论摘要"}
        - name: 挑战接口设计
          agent: design-breaker
          role: attacker
          task: |
            审查 ToTypst 接口设计方案，重点挑战以下方面：

            1. 是否遗漏需要实现 toTypst 的 AST 节点。
            2. 输出规则是否覆盖空白、嵌套、混合块/行内结构、特殊字符转义等高风险场景。
            3. 方案是否与 ToHtml、ToMarkdownString 的现有抽象方式一致，是否引入额外耦合。
            4. 是否存在设计未到位之处，例如接口边界模糊、复用路径不清、扩展性不足。
            5. 是否可能在后续测试阶段出现无法稳定断言的输出歧义。

            输出：
            - 设计缺陷列表（按严重级别排序）
            - 必须补强项
            - 可优化项
        - name: 设计裁判
          agent: design-judge
          role: judge
          task: |
            基于设计方案和挑战意见做出裁决。

            判定标准：
            1. ToTypst 的接口形态是否明确且与项目风格一致。
            2. 相关 AST 节点范围是否盘点充分。
            3. 输出规则是否足够支撑稳定实现和稳定测试。
            4. 是否已明确不破坏 ToHtml 与 ToMarkdownString 的兼容路径。

            输出 JSON：
            {"verdict":"pass|fail","next_state":"实现落地","summary":"设计裁决结论"}
      transitions:
        - to: 实现落地
          condition:
            verdict: pass
          priority: 1
          label: 设计通过
        - to: 接口设计
          condition:
            verdict: fail
          priority: 2
          label: 设计需继续迭代
    - name: 实现落地
      description: 新增 ToTypst 接口并为相关节点实现 toTypst
      isInitial: false
      isFinal: false
      requireHumanApproval: true
      position:
        x: 360
        y: 220
      steps:
        - name: 实现 ToTypst 能力
          agent: developer
          role: defender
          task: |
            在 /Users/sundaiyue/Documents/markit 工作区内实现 ToTypst 能力，严格遵循已通过的设计方案。

            必须完成：
            1. 新增 ToTypst 接口，并接入 markit/markit 解析器的正确抽象层。
            2. 为设计阶段确认的全部相关 AST 节点实现 toTypst。
            3. 如现有 ToHtml、ToMarkdownString 存在可复用逻辑，可做最小必要重构，但不得引入无关改动。
            4. 保持命名、目录组织、调用路径与项目既有风格一致。
            5. 修改后先执行项目已有的相关构建或测试命令，确认实现基本可运行。

            输出：
            - 修改文件列表
            - 关键实现说明
            - 初步验证结果
        - name: 审计实现完整性
          agent: code-auditor
          role: attacker
          task: |
            审查 ToTypst 实现结果，重点检查：

            1. 是否遗漏节点实现或接口接入点。
            2. 是否出现与 ToHtml、ToMarkdownString 行为模式不一致的实现。
            3. 是否引入不必要重构、接口污染或维护风险。
            4. 代码组织、命名、可读性和一致性是否合格。
            5. 是否存在明显回归风险或边界输入处理缺口。

            输出：
            - 审计发现列表
            - 必修问题
            - 回归风险评估
        - name: 实现裁判
          agent: code-judge
          role: judge
          task: |
            基于实现结果和审计意见做出裁决。

            判定标准：
            1. ToTypst 接口是否已正确接入。
            2. 所有相关节点是否已具备 toTypst 实现。
            3. 实现是否遵循设计结论且没有明显质量硬伤。
            4. 是否具备进入测试补齐阶段的条件。

            输出 JSON：
            {"verdict":"pass|fail","next_state":"测试补齐","summary":"实现裁决结论"}
      transitions:
        - to: 测试补齐
          condition:
            verdict: pass
          priority: 1
          label: 实现通过
        - to: 实现落地
          condition:
            verdict: fail
          priority: 2
          label: 实现需继续修正
    - name: 测试补齐
      description: 补齐接口级、节点级和回归测试
      isInitial: false
      isFinal: false
      position:
        x: 620
        y: 220
      steps:
        - name: 补齐测试与样例
          agent: tester
          role: defender
          task: |
            在 /Users/sundaiyue/Documents/markit 工作区内补齐 ToTypst 的测试与回归验证。

            必须完成：
            1. 先阅读项目现有测试目录、测试框架和命名风格，按既有规范补充测试。
            2. 新增接口级测试，验证 ToTypst 的统一调用路径。
            3. 新增节点级测试，覆盖典型 AST 节点与关键组合场景。
            4. 补充回归样例，重点对齐 ToHtml、ToMarkdownString 的稳定行为模式。
            5. 覆盖边界场景：空输入、深层嵌套、混合结构、特殊字符、空白与换行稳定性。
            6. 执行相关测试命令并汇总结果。

            输出：
            - 新增测试清单
            - 测试执行结果
            - 覆盖缺口说明（如有）
        - name: 挑战测试充分性
          agent: code-auditor
          role: attacker
          task: |
            审查测试补齐结果，重点挑战：

            1. 是否遗漏关键 AST 节点或高风险语法组合。
            2. 是否缺少与 ToHtml、ToMarkdownString 对齐的回归断言。
            3. 是否缺少边界条件、错误输入或格式稳定性断言。
            4. 测试是否真正验证了行为稳定，而非仅覆盖表面调用。
            5. 是否存在脆弱断言或无法长期维护的测试设计。

            输出：
            - 测试缺口列表
            - 高风险遗漏项
            - 建议补测项
        - name: 测试裁判
          agent: code-judge
          role: judge
          task: |
            基于测试结果和审查意见做出裁决。

            判定标准：
            1. 是否已覆盖接口级、节点级和回归级验证。
            2. 是否能够证明 ToTypst 行为稳定。
            3. 是否仍存在必须回退实现阶段修复的问题。

            输出 JSON：
            {"verdict":"pass|fail","next_state":"回归收口","summary":"测试裁决结论"}
      transitions:
        - to: 回归收口
          condition:
            verdict: pass
          priority: 1
          label: 测试充分
        - to: 实现落地
          condition:
            verdict: fail
          priority: 2
          label: 测试发现缺陷，回退实现
    - name: 回归收口
      description: 最终执行回归验证并确认工作流完成
      isInitial: false
      isFinal: true
      position:
        x: 880
        y: 220
      steps:
        - name: 执行最终回归验证
          agent: tester
          role: defender
          task: |
            对 ToTypst 改动执行最终回归收口，目标是确认改动可交付。

            必须完成：
            1. 运行目标测试集和必要的相关回归验证。
            2. 重点确认新增 ToTypst 不破坏既有 ToHtml、ToMarkdownString 行为。
            3. 汇总失败项、波动项和剩余风险。
            4. 如发现问题，明确建议回退到“测试补齐”还是“实现落地”。

            输出：
            - 最终测试结果汇总
            - 风险清单
            - 建议 next_state
        - name: 最终裁决
          agent: code-judge
          role: judge
          task: |
            基于最终回归结果给出工作流结束裁决。

            判定标准：
            1. ToTypst 是否已按要求接入并稳定工作。
            2. 所有相关节点是否已完成实现并得到测试证据支持。
            3. 是否没有明显回归阻塞项。

            输出 JSON：
            {"verdict":"pass|fail","next_state":"回归收口","summary":"最终裁决结论"}
      transitions: []
context:
  projectRoot: /Users/sundaiyue/Documents/markit
  workspaceMode: in-place
  requirements: >
    为 markit/markit 解析器新增 ToTypst 接口，并为所有相关节点实现 toTypst，
    同时补充测试与回归验证，模式参考 ToHtml 和 ToMarkdownString 行为稳定。
  codebase: /Users/sundaiyue/Documents/markit/markit
  timeoutMinutes: 240
