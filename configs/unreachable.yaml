workflow:
  name: 仓颉 Unreachable 告警场景总结
  description: >
    基于 cangjie_compiler 源码与仓颉语法技能，系统梳理所有触发 unreachable 告警的场景， 形成可追溯结论（场景 ->
    语法/规则依据 -> 源码证据 -> 结论）。
  mode: state-machine
  maxTransitions: 24
  states:
    - name: 范围建模
      description: 明确 unreachable 告警统计口径、扫描范围与证据规范
      isInitial: true
      isFinal: false
      position:
        x: 120
        y: 180
      steps:
        - name: 口径与范围定义
          agent: compiler_architect
          role: defender
          task: |
            在 cangjie_compiler 工作目录下建立本次分析的统一口径。

            必须输出：
            1. unreachable 告警的定义边界（编译期告警 vs 运行期不可达语义）
            2. 需覆盖的编译阶段与模块范围（语法/语义/控制流/模式匹配/常量传播等）
            3. 可追溯证据模板（每条至少包含：触发条件、最小示例、源码位置、规则依据、结论）
            4. 排除项与反例（避免把非 unreachable 告警误计入）

            输出 JSON：
            {"verdict":"pass|fail","summary":"范围定义结论","artifacts":["范围说明文档路径"]}
          skills:
            - cangjie_compiler_knowledge
            - cangjie_basic_concepts
            - cangjie_pattern_match
            - cangjie_for
      transitions:
        - to: 场景发现
          condition:
            verdict: pass
          priority: 1
          label: 口径通过
        - to: 范围建模
          condition:
            verdict: fail
          priority: 2
          label: 口径不完整，重做
    - name: 场景发现
      description: 扫描源码并提取所有 reachable/unreachable 相关告警触发路径
      isInitial: false
      isFinal: false
      position:
        x: 320
        y: 180
      steps:
        - name: 编译器源码扫描与归档
          agent: compiler_developer
          role: defender
          task: |
            在 cangjie_compiler 源码中系统扫描 unreachable 告警触发路径，建立证据清单。

            要求：
            1. 搜索告警关键字与诊断入口（例如 unreachable、dead code、control flow 终止后语句等）
            2. 追踪每个入口的调用链，定位最终触发条件
            3. 对每类场景给出最小触发代码形态
            4. 输出结构化场景表：
               - scene_id
               - trigger_condition
               - grammar_or_rule_basis
               - source_file_and_function
               - expected_diagnostic
               - minimal_repro

            输出 JSON：
            {"verdict":"pass|fail","summary":"场景发现结果","scene_count":N,"artifacts":["场景表路径"]}
          skills:
            - cangjie_compiler_knowledge
            - cangjie-vec-retriever-guide
      transitions:
        - to: 反向挑战
          condition:
            verdict: pass
          priority: 1
          label: 已生成场景清单
        - to: 场景发现
          condition:
            verdict: fail
          priority: 2
          label: 发现失败，重新扫描
    - name: 反向挑战
      description: 红队验证遗漏、误报、重复口径问题
      isInitial: false
      isFinal: false
      position:
        x: 520
        y: 180
      steps:
        - name: 场景覆盖挑战
          agent: compiler_code-hunter
          role: attacker
          task: |
            对“场景发现”产物做攻击式复核，重点找三类问题：遗漏、误报、重复。

            要求：
            1. 复核每条场景是否真的会触发 unreachable 告警
            2. 构造边界样例验证是否存在漏网场景
            3. 标记重复或口径冲突条目
            4. 输出修正建议（新增/删除/合并）及证据

            输出 JSON：
            {"verdict":"pass|fail|conditional_pass","summary":"挑战结果","missed":N,"false_positive":N,"duplicates":N,"artifacts":["挑战报告路径"]}
          skills:
            - cangjie_compiler_knowledge
            - cangjie_pattern_match
            - cangjie_option
      transitions:
        - to: 裁判定稿
          condition:
            verdict: pass
          priority: 1
          label: 挑战通过
        - to: 裁判定稿
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件通过，交裁判定夺
        - to: 场景发现
          condition:
            verdict: fail
            minIssueCount: 1
          priority: 3
          label: 存在严重遗漏，回到发现阶段
    - name: 裁判定稿
      description: 仲裁争议并生成最终可追溯结论
      isInitial: false
      isFinal: false
      position:
        x: 720
        y: 180
      steps:
        - name: 证据仲裁与结论收敛
          agent: compiler_design-judge
          role: judge
          task: |
            结合蓝队场景表与红队挑战报告，做最终仲裁并定稿。

            必须完成：
            1. 对每条争议给出确认/驳回及理由
            2. 输出最终“unreachable 告警场景总表”（去重、修正后）
            3. 为每条结论附可追溯链路：
               场景 -> 语法/规则依据 -> 源码证据 -> 结论
            4. 给出覆盖度评估与剩余风险说明

            输出 JSON：
            {"verdict":"pass|fail","summary":"最终仲裁结论","final_scene_count":N,"artifacts":["最终总结文档路径"]}
          skills:
            - cangjie_compiler_knowledge
      transitions:
        - to: 交付完成
          condition:
            verdict: pass
          priority: 1
          label: 定稿完成
        - to: 场景发现
          condition:
            verdict: fail
          priority: 2
          label: 证据不足，回退补充
    - name: 交付完成
      description: 输出最终场景总结与后续维护建议
      isInitial: false
      isFinal: true
      position:
        x: 920
        y: 180
      steps:
        - name: 交付检查
          agent: compiler_documentation-writer
          role: defender
          task: |
            对最终产物执行交付检查并输出摘要：
            1. 最终场景数量与分类分布
            2. 每类场景的代表性样例
            3. 仍需人工持续跟踪的高风险区域
            4. 后续增量维护建议（新增规则时如何扩展场景库）

            输出 JSON：
            {"verdict":"pass","summary":"交付完成","artifacts":["交付摘要路径"]}
          skills:
            - cangjie_compiler_knowledge
      transitions: []
context:
  projectRoot: cangjie_compiler
  requirements: 基于 cangjie_compiler 源码与仓颉语法技能，系统梳理所有触发 unreachable 告警的场景并形成可追溯结论
  codebase: cangjie_compiler/src
  timeoutMinutes: 120
  skills:
    - cangjie_compiler_knowledge
    - cangjie-vec-retriever-guide
    - cangjie_pattern_match
    - cangjie_option
    - cangjie_basic_concepts
