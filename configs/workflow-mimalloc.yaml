workflow:
  name: mimalloc作为默认的内存分配器
  description: 设计 → 实施 → 测试 → 优化
  phases:
    - name: 设计阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: all_resolved
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 提出设计方案
          agent: architect
          task: 根据需求设计技术方案，提供 2-3 个备选方案
          role: defender
        - name: 攻击设计方案
          agent: design-breaker
          task: 分析设计方案，找出所有可能的缺陷和风险
          type: adversarial
          role: attacker
        - name: 评审设计方案
          agent: design-judge
          task: 评估设计方案和发现的问题，给出决策建议
          role: judge
      checkpoint:
        name: 设计方案审批
        message: 请审查设计方案和发现的问题，决定是否进入实施阶段
    - name: 实施阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: no_new_bugs_3_rounds
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 编写代码
          agent: developer
          task: 根据设计方案实现代码
          role: defender
        - name: 代码审查
          agent: code-hunter
          task: 审查代码，发现潜在的漏洞和问题
          type: adversarial
          role: attacker
        - name: 验证修复
          agent: code-judge
          task: 验证代码修复的有效性
          role: judge
      checkpoint:
        name: 代码实现审查
        message: 请审查代码实现和修复情况，决定是否进入测试阶段
    - name: 测试阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: no_new_bugs_3_rounds
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 功能测试
          agent: tester
          task: 编写和执行 E2E 功能测试用例。必须先阅读项目中现有的测试用例了解测试框架、用例格式和目录结构，然后严格遵循这些规范编写新的测试用例。使用可用的
            Skills 来构建和运行测试。
          role: defender
        - name: 压力测试
          agent: stress-tester
          task: 执行极限场景和压力测试。必须遵循项目现有的测试框架编写测试用例，使用可用的 Skills 来构建和运行测试。
          type: adversarial
          role: attacker
        - name: 代码审计
          agent: code-auditor
          task: 审计代码是否符合编码规范
          role: judge
        - name: 设计修复方案
          agent: fix-architect
          task: 根据测试和审计发现的缺陷，设计系统性修复方案
          role: defender
        - name: 攻击修复方案
          agent: fix-breaker
          task: 攻击修复方案，验证方案的完整性和鲁棒性
          type: adversarial
          role: attacker
        - name: 评审修复方案
          agent: fix-judge
          task: 评审修复方案和攻击发现，做出最终裁决
          role: judge
        - name: 实施修复
          agent: fix-developer
          task: 根据评审通过的修复方案实施代码修复，编写回归测试。修复后必须使用可用的 Skills 进行增量编译和测试验证。
          role: defender
        - name: 审查修复代码
          agent: fix-hunter
          task: 审查修复代码，验证修复有效性，发现潜在的绕过场景和新引入的问题
          type: adversarial
          role: attacker
        - name: 验证修复结果
          agent: fix-reviewer
          task: 评审修复代码的有效性和完整性，仲裁攻击方发现，给出最终裁决
          role: judge
      checkpoint:
        name: 测试结果验收
        message: 请审查测试结果和修复情况，决定是否进入优化阶段
    - name: 优化阶段
      iteration:
        enabled: true
        maxIterations: 5
        exitCondition: no_new_bugs_3_rounds
        consecutiveCleanRounds: 3
        escalateToHuman: true
      steps:
        - name: 性能优化
          agent: developer
          task: 优化性能瓶颈。使用可用的 Skills 进行编译构建和测试验证。
          role: defender
        - name: 性能退化测试
          agent: performance-breaker
          task: 寻找性能退化场景
          type: adversarial
          role: attacker
        - name: 性能仲裁
          agent: performance-judge
          task: 验证性能提升的真实性
          role: judge
        - name: 设计优化修复方案
          agent: fix-architect
          task: 根据性能测试和仲裁发现的问题，设计针对性的修复和优化方案
          role: defender
        - name: 攻击优化修复方案
          agent: fix-breaker
          task: 攻击优化修复方案，验证方案是否会引入新的性能退化或功能缺陷
          type: adversarial
          role: attacker
        - name: 评审优化修复方案
          agent: fix-judge
          task: 评审优化修复方案和攻击发现，做出最终裁决
          role: judge
        - name: 实施优化修复
          agent: fix-developer
          task: 根据评审通过的优化修复方案实施代码修改，编写回归测试。修复后必须使用可用的 Skills 进行增量编译和测试验证。
          role: defender
        - name: 审查优化修复代码
          agent: fix-hunter
          task: 审查优化修复代码，验证修复有效性，发现潜在的绕过场景和新引入的问题
          type: adversarial
          role: attacker
        - name: 验证优化修复结果
          agent: fix-reviewer
          task: 评审优化修复代码的有效性和完整性，仲裁攻击方发现，给出最终裁决
          role: judge
      checkpoint:
        name: 性能优化决策
        message: 请审查性能优化和修复结果，决定是否完成工作流
context:
  projectRoot: ../cangjie_compiler
  requirements: 使用mimalloc替代普通malloc作为默认的内存分配器，提升性能
  codebase: ../cangjie_compiler/src
  timeoutMinutes: 300
judgeConfig:
  regressionThreshold: 0.1
