workflow:
  name: OH CangjieDev
  description: OpenHarmony OH 仓颉移植（阶段式闭环）
  phases:
    - name: 分析阶段
      steps:
        - name: Gap 分析
          agent: oh-cangjie-analyst
          role: defender
          task: >
            依据 context.requirements 中给定的 ArkTS API 需求，
            使用 ohos-cangjie-analyst-skill 执行 Gap 分析与源码定位，
            输出结构化分析报告和分批建议，并将报告写入项目根目录下
            `.ace-outputs/{runId}/Gap_分析.md` 的 Markdown 文件中。
          skills:
            - ohos-cangjie-analyst-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      checkpoint:
        name: 分析结果确认
        message: >
          请检查 Gap 分析报告与分批建议，确认 API 范围与优先级是否合理，
          决定是否进入架构设计阶段。

    - name: 设计阶段
      steps:
        - name: 架构设计
          agent: oh-cangjie-architect
          role: defender
          task: >
            在「Gap 分析」步骤产出的分析报告和分批建议基础上，
            使用 ohos-cangjie-architect-skill 为当前批次 API 输出架构文档
            （目录结构、文件清单、类型映射、FFI 命名规则、构建配置与验证命令建议），
            并将架构文档写入 `.ace-outputs/{runId}/架构设计.md`。
          skills:
            - ohos-cangjie-architect-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      checkpoint:
        name: 架构方案确认
        message: >
          请检查架构文档（目录结构、类型映射、FFI 命名、构建配置等），
          确认方案是否可实施，决定是否进入实现阶段。

    - name: 实现阶段
      steps:
        - name: 编码实现
          agent: oh-cangjie-coder
          role: defender
          task: >
            依据「架构设计」步骤产出的架构文档，
            使用 ohos-cangjie-coder-skill 实现对应的仓颉源代码（*.cj）与
            C++ FFI 代码，并按 Skill 指引执行必要的构建/测试验证。
            将关键实现说明与验证结果写入 `.ace-outputs/{runId}/编码实现.md`。
          skills:
            - ohos-cangjie-coder-skill
        - name: 代码审查(红军)
          agent: oh-cangjie-reviewer
          role: attacker
          task: >
            在「编码实现」完成后，
            使用 ohos-cangjie-reviewer-skill 按审查清单逐项检查 CJ/FFI 实现：
            - FFI 命名与可见性
            - C++ FFI 与 ArkTS NAPI 行为是否一一对齐
            - 文件组织与分层是否符合规范
            - 仓颉语言约束是否被满足
            - 构建系统与 bundle.json/Kit 注册是否正确
            只列出问题与修复建议，不直接修改代码。
            将审查报告写入 `.ace-outputs/{runId}/代码审查_红军.md`。
          skills:
            - ohos-cangjie-reviewer-skill
          enablePlanLoop: true
          maxPlanRounds: 2

    - name: 验证阶段
      steps:
        - name: 审查与编译
          agent: oh-cangjie-reviewer
          task: >
            汇总前序所有步骤的产出（Gap 分析报告、架构文档、实现说明、红军审查报告），
            使用 ohos-cangjie-reviewer-skill 对本轮变更相关的 CJ/FFI 模块执行
            完整审查清单与编译验证，输出最终审查报告（包含通过/有条件通过/不通过结论
            及关键问题列表），并写入 `.ace-outputs/{runId}/最终审查与编译验证.md`。
          skills:
            - ohos-cangjie-reviewer-skill
          enablePlanLoop: true
          maxPlanRounds: 2
      checkpoint:
        name: 验证结果确认
        message: >
          请检查最终审查与编译验证报告，决定是否结束本次工作流，或回退到实现/设计阶段
          手动修复后重新运行。

context:
  projectRoot: ""
  requirements: ""
  timeoutMinutes: 300
  routerModel: claude-sonnet-4-6
