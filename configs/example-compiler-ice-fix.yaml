workflow:
  name: 编译器 ICE 修复工作流
  description: 修复仓颉编译器内部错误（ICE），包含复现、根因分析、修复实现和回归验证
  mode: state-machine
  maxTransitions: 30
  
  states:
    - name: 复现确认
      description: 构造最小复现用例，确认 ICE 可稳定触发
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: 构造最小复现用例
          agent: compiler_issue-reproducer
          role: defender
          task: >
            针对 extend ICE 构造最小可复现用例，验证 ICE 11 (SIGSEGV) 可稳定触发。
            
            复现目标代码（简化版，参考原始问题）：
            ```
            interface I0 { func f(){} }
            interface I1 <: I0 { }
            class C { }
            extend C <: I1 { }
            extend C <: I0 { }
            ```
            
            请在 ../cangjie_compiler_3112 目录下：
            1. 创建 /tmp/extend_ice_repro.cj，内容为上述代码（优先简化版）
            2. 确认 cjc 编译器已构建：
               source ../cangjie_compiler_3112/output/envsetup.sh
               ls ../cangjie_compiler_3112/output/bin/cjc
            3. 编译测试：
               cjc /tmp/extend_ice_repro.cj -o /tmp/extend_ice_repro
               记录完整 stdout + stderr
               确认是否触发 ICE (code 11 / SIGSEGV)
            4. 尝试不同变体确认触发条件：
               - 去掉其中一个 extend → 确认是否正常
               - 去掉 func f(){} → 确认是否正常
               - 去掉 extends I0 → 确认是否正常
               - 用普通泛型而非 Option<A> → 确认是否正常
            5. 同时在 Linux 环境下测试（如果可能）确认 SIGSEGV 是否稳定
            
            输出：完整源码 + 编译输出 + 变体测试结果，确认 ICE 触发条件
          skills:
            - cangjie_compiler_knowledge
        - name: 复现裁判
          agent: compiler_fix-judge
          role: judge
          task: |
            评审复现结果，确认 ICE 可稳定触发。
            
            1. 简化版代码是否触发 ICE？
            2. 如果简化版不触发，原始泛型版是否触发？
            3. 通过变体测试，确定触发 ICE 的充分必要条件：
               - 两个 extend 是否都必须存在？
               - func f(){} 是否必须存在？
               - extends I0/I1 继承链是否必须存在？
               - Option<A> 泛型是否必须存在？
            
            输出 JSON：
            {"verdict":"pass|fail","next_state":"根因分析","summary":"复现结论，含 ICE 触发充分必要条件"}
      transitions:
        - to: 根因分析
          condition:
            verdict: pass
          priority: 1
          label: ICE 已复现
        - to: 复现确认
          condition:
            verdict: fail
          priority: 2
          label: 未能复现，重试

    - name: 根因分析
      description: 定位 extend 成员合并中的空指针/野指针解引用
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 深度代码路径分析
          agent: compiler_code-hunter
          role: defender
          task: >
            精确分析 extend ICE 根因。源码位于 ../cangjie_compiler_3112/src/。
            
            已知根因概要（需验证）：
            1. 两个 extend 分别将 C 扩展为实现 I1<Option<A>> 和 I0<Option<A>>
            2. I1<Option<A>> <: I0<Option<A>>，构成菱形继承路径
            3. func f(){} 在 I0 中定义，两个 extend 都需要继承/合并该成员
            4. MergeInheritedMemberHelper::UpdateInheritedMemberIfNeeded 在处理复合类型继承链时，
               对 Option<A> 这种泛型复合类型，可能对 nullptr 或无效指针进行解引用 → SIGSEGV (code 11)
            
            请重点验证以下源码位置：
            1. 读取 src/frontend/class_extend/ExtendResolver.cpp
               - 两个 extend 如何分别处理
               - CheckExtendMemberValid (L1033 附近) 的行为
               - 两个 extend 扩展 I1<Option<A>> 和 I0<Option<A>> 时，对 func f 的处理
            2. 读取 src/frontend/type_inherit/MergeInheritedMemberHelper.cpp
               - UpdateInheritedMemberIfNeeded 方法 (L141 附近)
               - 对泛型父类型 Option<A> 的处理逻辑
               - 成员合并时的空指针解引用风险
            3. 读取 src/frontend/type_inherit/InheritResolver.cpp
               - ResolveExtendType 如何解析 extend 的泛型参数
               - Option<A> 的实例化路径
            4. 分析为什么两个 extend + func f 是必要条件：
               - 单个 extend 时为什么正常？
               - func f 不存在时为什么正常？
               - 继承链 I1 <: I0 是如何影响成员合并路径的？
            5. 检查 CheckExtendMemberValid (L1033)：
               - 对重复 extend 扩展同名接口的检测逻辑
               - 为什么没有检测到冲突？
            
            输出：根因验证报告，含每处代码的精确文件:行号、代码片段、验证结论
          skills:
            - cangjie_compiler_knowledge
        - name: 根因挑战审查
          agent: compiler_code-auditor
          role: attacker
          task: |
            独立审查根因分析，验证以下假设并寻找遗漏路径：
            
            1. 假设 MergeInheritedMemberHelper::UpdateInheritedMemberIfNeeded L141 是罪魁祸首
               - 验证：Option<A> 作为泛型实例化类型，在成员合并时的代码路径
               - 验证：是否有对 nullptr 的未检查解引用
               - 验证：是否与 Option 类型本身的内部表示有关
            2. 假设两个 extend + func f 是必要触发条件
               - 验证：是否是菱形继承路径导致了双重成员合并
               - 验证：I1<Option<A>> <: I0<Option<A>> 是否导致 f 被合并两次
               - 验证：extend C <: I1<Option<A>> 时，I0<Option<A>> 的成员是否也一并带入
            3. 假设 CheckExtendMemberValid L1033 存在检测漏洞
               - 验证：两个 extend 扩展不同接口（I1 vs I0）时，是否被识别为冲突
               - 验证：泛型参数 Option<A> 是否被正确规范化比较
            4. 寻找其他可能的 ICE 路径：
               - Option<A> 换成其他泛型（如 List<A>）是否也触发？
               - func f 换成其他成员（如属性 prop）是否也触发？
               - 多层继承链（如 I2 <: I1 <: I0）是否加剧问题？
            
            输出：独立验证报告，确认或修正根因假设，并指出可能的遗漏
          skills:
            - cangjie_compiler_knowledge
        - name: 根因分析裁判
          agent: compiler_fix-judge
          role: judge
          task: |
            综合两个 Agent 的分析，裁定根因是否准确：
            
            1. MergeInheritedMemberHelper::UpdateInheritedMemberIfNeeded 中对 Option<A> 的处理
               是否确实存在空指针解引用？
            2. 触发 ICE 的充分必要条件是否已明确？
            3. CheckExtendMemberValid 的检测漏洞是否是根本原因之一？
            
            输出 JSON：
            {"verdict":"pass|fail","next_state":"修复方案设计","summary":"根因结论，含精确文件路径和行号"}
      transitions:
        - to: 修复方案设计
          condition:
            verdict: pass
          priority: 1
          label: 根因确认
        - to: 根因分析
          condition:
            verdict: fail
          priority: 2
          label: 根因不明确

    - name: 修复方案设计
      description: 设计最小侵入性修复方案
      requireHumanApproval: true
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 设计修复方案
          agent: compiler_fix-architect
          role: defender
          task: >
            基于根因分析，设计最小侵入性修复方案。
            
            根因核心（需根据实际分析结果修正）：
            
            方案 A（推荐）：在 MergeInheritedMemberHelper::UpdateInheritedMemberIfNeeded 中增加对泛型复合类型的空指针检查
            - 在解引用成员指针前，先检查是否为 nullptr
            - 对 Option<A> 这类泛型实例化类型，确保父类型解析完全后再访问成员
            
            方案 B（备选）：在 CheckExtendMemberValid 中增加冲突检测
            - 对泛型接口扩展，规范化类型后再比较
            - 如果两个 extend 扩展的接口存在继承关系，且包含同名成员，报错而非 ICE
            
            方案 C（备选）：在 ExtendResolver 中延迟成员合并
            - 收集完所有 extend 后，再统一进行成员合并
            - 避免在单个 extend 处理时就尝试合并来自继承链的成员
            
            请分析：
            1. 方案 A/B/C 的优劣对比
            2. 修复后 CheckExtendMemberValid 的行为是否需要调整
            3. 泛型实例化（如 Option<A>）的特殊处理是否需要
            4. 修复对编译性能的影响
            5. 修复后的测试策略
            
            输出：方案对比分析 + 推荐方案 + 风险评估
          skills:
            - cangjie_compiler_knowledge
        - name: 方案安全性审查
          agent: compiler_design-breaker
          role: attacker
          task: >
            对修复方案进行安全性审查，寻找潜在风险和遗漏：
            
            1. 方案 A：空指针检查
               - 加了空指针检查后，原本应该在更早阶段捕获的错误是否会延迟暴露？
               - 会不会引入静默的正确性错误（应该报错但变成了正常）？
               - Option<A> 的 nullptr 场景是否还有其他地方没覆盖到？
            2. 方案 B：冲突检测
               - 规范化泛型类型的逻辑是否完备？
               - I1<Option<A>> <: I0<Option<A>> 是否会触发误报？
               - extend C <: I1<Option<A>> { } 和 extend C <: I0<Option<A>> { }
                 是否应该被允许（合法代码，只是成员合并有歧义）？
            3. 方案 C：延迟合并
               - 延迟合并是否会破坏现有的其他 extend 功能？
               - 对 extend 中使用 this/self 的场景是否有影响？
               - 性能影响如何？
            4. 尝试攻击方案：
               - 构造使修复后仍然 ICE 的边界用例
               - 构造使修复后产生错误编译结果的用例
               - 构造使修复后误报的合法用例
            
            输出：安全性审查报告，明确风险和改进建议
          skills:
            - cangjie_compiler_knowledge
        - name: 方案设计裁判
          agent: compiler_design-judge
          role: judge
          task: |
            综合分析和审查结果，确定最终修复方案：
            
            1. 三个方案的最终评价
            2. 是否需要组合多个方案（A+B 或 A+C）
            3. 精确的修复代码修改点
            
            最终修复方案应包含：
            1. 精确的文件路径和行号
            2. 修改前后的代码对比
            3. 修复后的预期行为
            4. 测试验证策略
            
            输出 JSON：
            {"verdict":"pass|fail","next_state":"代码修复实现","summary":"最终修复方案，含精确修改内容"}
      transitions:
        - to: 代码修复实现
          condition:
            verdict: pass
          priority: 1
          label: 方案确认
        - to: 修复方案设计
          condition:
            verdict: fail
          priority: 2
          label: 方案有问题

    - name: 代码修复实现
      description: 按最终方案修改源码并编译验证
      requireHumanApproval: true
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 实现代码修复
          agent: compiler_fix-developer
          role: defender
          task: >
            按照评审通过的修复方案，在 ../cangjie_compiler_3112 源码中实施修复。
            
            请执行：
            1. 读取最终修复方案确定的目标文件和行号
            2. 应用精确代码修改
            3. 使用 build-cangjie 技能重新编译：
               cd ../cangjie_compiler_3112 && source output/envsetup.sh && cmake --build build --target cjc -j$(nproc)
            4. 编译成功后，运行 /tmp/extend_ice_repro.cj：
               cjc /tmp/extend_ice_repro.cj -o /tmp/extend_ice_repro
               确认不再 ICE
            5. 运行所有变体测试用例确认修复完整性
            
            输出：修改的完整 diff + 编译结果 + 验证测试输出
          skills:
            - cangjie_compiler_knowledge
            - build-cangjie
        - name: 代码审计
          agent: compiler_fix-reviewer
          role: attacker
          task: |
            审计 fix-developer 的代码修改：
            
            1. 逐行审查修改，确认逻辑正确性
            2. 检查空指针检查是否正确覆盖所有路径
            3. 确认修复不影响其他 extend 功能的正确性
            4. 验证没有引入新的内存安全问题
            
            输出：代码审计报告
          skills:
            - cangjie_compiler_knowledge
        - name: 实现裁判
          agent: compiler_fix-judge
          role: judge
          task: |
            评审代码修复和审计结果：
            1. 编译是否成功？
            2. ICE 是否已修复（SIGSEGV 不再触发）？
            3. 代码审计发现的问题是否已修正？
            
            输出 JSON：
            {"verdict":"pass|fail","next_state":"回归验证","summary":"实现评审结论"}
      transitions:
        - to: 回归验证
          condition:
            verdict: pass
          priority: 1
          label: 实现确认
        - to: 代码修复实现
          condition:
            verdict: fail
          priority: 2
          label: 实现有问题

    - name: 回归验证
      description: 全面验证修复效果，确保无回归
      isInitial: false
      isFinal: false
      position:
        x: 900
        y: 200
      steps:
        - name: 全面回归测试
          agent: compiler_tester
          role: defender
          task: |
            对修复后的 cjc 进行回归验证：
            
            1. 验证 ICE 修复效果：
               - 运行 /tmp/extend_ice_repro.cj：确认不再 ICE，编译成功
               - 运行所有变体测试用例
            2. extend 基础功能验证：
               - 单独 extend 的正常功能是否正常
               - 泛型 extend 的正常功能是否正常
               - 多层继承 extend 是否正常
            3. 合法代码验证（应该正常编译）：
               - 两个 extend 扩展不相关接口（无 func f 冲突）
               - extend 实现带 func 的接口（单接口）
            4. 边界用例：
               - 三层继承链：I2 <: I1 <: I0
               - 多个同名 func：多个 extend 实现同名方法
               - 泛型泛型：Option<Option<A>> 嵌套
            5. 运行相关单元测试（查找 extend、继承相关测试）
            
            输出：完整测试报告
          skills:
            - cangjie_compiler_knowledge
        - name: 压力测试
          agent: compiler_performance-breaker
          role: attacker
          task: |
            对修复进行压力测试和边界探索：
            
            1. 多重泛型嵌套：
               ```
               interface I0<T> { func f(){} }
               interface I1<T> <: I0<T> { }
               class C<A,B> { }
               extend<A,B> C<A,B> <: I1<Option<A>> { }
               extend<A,B> C<A,B> <: I0<Option<B>> { }
               ```
            2. 多层继承链扩展：
               ```
               interface I0 { func f(){} }
               interface I1 <: I0 { }
               interface I2 <: I1 { }
               class C { }
               extend C <: I2 { }
               extend C <: I1 { }
               extend C <: I0 { }
               ```
            3. 混合 extend 和普通继承：
               ```
               interface I0 { func f(){} }
               class D <: I0 { }
               class C <: D { }
               extend C <: I0 { }
               ```
            4. 不同泛型类型替换 Option<A>：
               - List<A>、Map<A,B>、Set<A> 等容器类型
            5. 尝试触发边界 ICE：
               - 构造使修复后仍然崩溃的用例
            
            输出：压力测试报告，标注是否发现新问题
          skills:
            - cangjie_compiler_knowledge
        - name: 最终裁判
          agent: compiler_fix-judge
          role: judge
          task: |
            综合所有验证结果，给出最终裁定：
            1. ICE 是否已修复？
            2. 回归测试是否全部通过？
            3. 压力测试是否发现新问题？
            4. 修复是否达到提交标准？
            
            输出 JSON：
            {"verdict":"pass|fail","next_state":"验证完成","summary":"最终验证结论"}
      transitions:
        - to: 验证完成
          condition:
            verdict: pass
          priority: 1
          label: 验证通过
        - to: 代码修复实现
          condition:
            verdict: fail
          priority: 2
          label: 验证失败

    - name: 验证完成
      description: 修复完成，生成修复报告
      isInitial: false
      isFinal: true
      position:
        x: 1100
        y: 200
      steps:
        - name: 生成修复报告
          agent: compiler_documentation-writer
          role: defender
          task: >
            基于整个修复流程，生成完整的修复报告：
            
            1. 问题描述：extend ICE 现象和触发条件
            2. 根因分析：MergeInheritedMemberHelper 中泛型复合类型的成员合并处理缺陷
            3. 修复方案：精确的代码修改（diff 格式）
            4. 验证结论：所有测试结果
            
            输出 JSON：
            {"verdict":"pass","next_state":"验证完成","summary":"修复报告已生成"}
      transitions: []

context:
  projectRoot: ../cangjie_compiler_3112
  requirements: >
    修复仓颉编译器在处理两个 extend 扩展同时扩展带同名成员函数接口时的 ICE。
    
    问题现象：以下代码在编译时触发 ICE (Internal Compiler Error)，
    Windows 环境下错误码 11 (SIGSEGV)：
    
    ```
    interface I0<T> { func f(){} }
    interface I1<T> <: I0<T> { }
    class C<A> { }
    extend<A> C<A> <: I1<Option<A>> { }
    extend<A> C<A> <: I0<Option<A>> { }
    ```
    
    已知两个 extend 扩展带 f 函数的复合类型继承关系，都是 ICE 的必要条件。
    
    验收标准：
    1. 上述代码不再 ICE，编译通过或给出明确语义错误（而非崩溃）
    2. 单个 extend 的正常功能不受影响
    3. 现有测试套件无回归
    4. 压力测试无新问题
  codebase: src/frontend/
  timeoutMinutes: 300
  skills:
    - cangjie_compiler_knowledge
    - build-cangjie
    - run-cangjie-tests
    - power-gitcode
