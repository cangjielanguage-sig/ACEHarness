workflow:
  name: OH Cangjie MD Skill Smoke Test (状态机)
  description: 最小化单阶段流程，用于验证 ohos-cangjie-md-skill 是否可用
  mode: state-machine
  maxTransitions: 5
  states:
    - name: 文档生成验证
      description: 用户提供源码路径，调用文档生成 agent 产出 md-sys 文档
      requireHumanApproval: false
      isInitial: true
      isFinal: true
      position:
        x: 300
        y: 200
      steps:
        - name: 生成并验证API文档
          agent: oh-cangjie-md-writer
          role: defender
          task: >
            读取 context.sourcePath 作为 cjcom 的 --filepath 输入，使用 ohos-cangjie-md-skill
            生成 md-sys 文档（--gen=md-sys）。输出目录使用
            .ace-outputs/{runId}/仓颉API文档。
            将执行结果写入 .ace-outputs/{runId}/仓颉API文档生成.md，内容至少包含：实际命令、输出目录、关键产物、失败原因（如有）。
            同时将本次生成的全部 Markdown 文档正文完整汇总写入
            .ace-outputs/{runId}/仓颉API文档完整输出.md（按原始文件路径分节，禁止仅输出摘要）。
            在回复末尾输出 JSON：{"verdict":"pass|fail","summary":"一句话结论","issues":[]}。
          skills:
            - ohos-cangjie-md-skill
          enablePlanLoop: false
          maxPlanRounds: 1
      transitions: []
context:
  projectRoot: /home/wujizhou/worksapce
  requirements: 仅用于验证 ohos-cangjie-md-skill 是否可用
  sourcePath: "/home/wujizhou/worksapce/foundation/filemanagement/filemanagement_cangjie_wrapper/ohos"
  timeoutMinutes: 60
  routerModel: gpt-5.4
  skills: []
