workflow:
  name: 编译器-elseif链UnreachableBranch告警误报修复
  description: 修复 UnreachableBranchCheck 在 else-if 链场景下将告警位置误报为外层 if 的起始行（line
    3）而非实际 unreachable 分支行的问题
  mode: state-machine
  maxTransitions: 50
  states:
    - name: 问题复现与范围确认
      description: 构造多种 else-if 链变体，确认告警行号误报问题的触发条件和范围
      isInitial: true
      isFinal: false
      steps:
        - name: 构造基础复现用例
          agent: compiler_issue-reproducer
          task: >
            针对 ../cangjie_compiler_947 编译器中 UnreachableBranchCheck 的 else-if
            链误报问题进行复现。


            问题描述：

            以下代码会触发 UnreachableBranchCheck 告警，但告警位置被报告为 line 3（main 函数起始行）而非实际
            unreachable 的 else-if 分支行：


            main() {
                let x = 15
                if (x > 20) {
                    println("x > 20")
                } else if (x > 10) {
                    println("x > 10")
                } else if (x > 0) {
                    println("x > 0")
                } else {
                    println("x <= 0")
                }
            }


            告警信息：报告到 line 3 main() 而非 else-if 条件行


            请在 ../cangjie_compiler_947 目录下：

            1. 创建复现文件 /tmp/repro_elseif.cj

            2. 使用 cjc 编译并确认触发 UnreachableBranch 告警

            3. 记录告警的完整输出，特别关注行号和列号

            4. 确认告警是指向 line 3（main）还是指向具体 unreachable 的分支行

            5. 改变 x 的值（设为 100，15，5，-5）分别测试，记录每个情况下告警位置的变化

            6. 构造 else-if 链嵌套场景（3层、4层嵌套），测试告警位置

            7. 构造多 if 并列场景，对比分析
          role: defender
        - name: 构造边界攻击变体
          agent: compiler_stress-tester
          task: |
            以攻击者视角构造边界变体，全面覆盖 else-if 链的告警位置问题：

            1. 纯 if（无 else）：是否会触发告警？告警位置？
            2. if-else 两分支：告警位置是否正确？
            3. if-elseif-else 三分支：告警位置？
            4. if-elseif-elseif-else 四层链：告警在第几层分支？
            5. 嵌套 if（而非 else-if）：告警位置？
            6. else-if 链中某分支常量条件恒为 true/false：告警位置？
            7. 在函数内嵌套 else-if：在函数内 vs 函数外告警？
            8. 多重嵌套 if-elseif：最内层 unreachable 时的告警链？

            对每个变体输出：
            - 完整源代码
            - 编译命令和完整告警输出
            - 告警指向的行号与实际 unreachable 行的对比表
          role: attacker
        - name: 确认问题范围
          agent: compiler_fix-judge
          task: |
            评审 compiler_issue-reproducer 和 compiler_stress-tester 的复现结论：

            1. 确认 else-if 链场景下告警位置误报的根本模式：
               - 是否只在 else-if 链中出现？
               - 误报位置是否有规律（总是指向 else-if 链起始行？）？
            2. 是否还有其他触发 UnreachableBranch 误报的场景？
            3. 是否可以进入根因定位阶段？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"根因定位|问题复现","summary":"问题范围确认，包含触发模式描述和边界条件"}
          role: judge
      transitions:
        - to: 根因定位
          condition:
            verdict: pass
          priority: 1
          label: 问题范围确认，进入根因定位
        - to: 问题复现与范围确认
          condition:
            verdict: fail
          priority: 2
          label: 复现不充分，重试
    - name: 根因定位
      description: 定位 UnreachableBranchCheck 在 else-if 链中取错 debug location 的精确代码路径
      isInitial: false
      isFinal: false
      steps:
        - name: 定位告警行号来源
          agent: compiler_fix-hunter
          task: >
            精确定位 UnreachableBranchCheck 在 else-if 链中取错告警行号的根因代码路径。


            已确认的源码链路：

            - 告警触发：UnreachableBranchCheck::VisitFunc

            - CHIR 翻译：TranslateIfExpr::TranslateFalseBlock() 处理 else-if 链

            - 关键问题：else-if 链中嵌套 IfExpr 的 falseBlock 是新建 block，其 debug location
            取自外层 IfExpr 而非内层条件


            请在 ../cangjie_compiler_947 源码中：

            1. 找到 UnreachableBranchCheck 的实现文件（可能在 src/StaticAnalysis/ 或类似目录）

            2. 找到 VisitFunc 中取 debug location 的代码行

            3. 追踪 block.GetDebugLocation() 的数据流，确认它从哪个节点获取位置

            4. 找到 TranslateIfExpr::TranslateFalseBlock() 中处理 else-if 链的逻辑

            5. 分析 else-if 链场景下：哪个 block 的 debug location 被误传给了
            UnreachableBranchCheck

            6. 确认 CHIR 中 else-if 链的 block 层级结构（外层 if 的 falseBlock vs 内层 if 的
            trueBlock）


            输出要求：

            - 贴出每个关键代码片段（含文件路径和行号）

            - 分析数据流：debug location 从源码到告警消息的完整传播路径
          role: defender
        - name: 攻击根因结论
          agent: compiler_design-breaker
          task: |
            以攻击者视角审查 compiler_fix-hunter 的根因定位：

            1. 质疑 TranslateIfExpr::TranslateFalseBlock() 的分析：
               - else-if 链中新建的 falseBlock 真的没有正确设置 debug location 吗？
               - 还是问题出在 UnreachableBranchCheck 取 location 的逻辑本身？
            2. 检查是否还有其他代码路径会导致类似误报
            3. 验证数据流分析是否完整，有没有遗漏的中间节点
            4. 确认 CHIR 层 block 结构图是否正确

            输出要求：
            - 每个质疑点必须有代码证据（文件路径+行号）
            - 如果做了验证实验，贴出完整命令和输出
          role: attacker
        - name: 确认根因
          agent: compiler_fix-judge
          task: |
            综合 compiler_fix-hunter 的定位结论和 compiler_design-breaker 的质疑，做出裁决：

            1. 根因是否已精确定位到具体代码行？
            2. 设计破坏者的质疑是否有效？
            3. 是否可以进入方案设计阶段？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"方案设计|根因定位","summary":"确认的根因描述，包含文件路径和行号"}
          role: judge
      transitions:
        - to: 方案设计
          condition:
            verdict: pass
          priority: 1
          label: 根因确认，进入方案设计
        - to: 根因定位
          condition:
            verdict: fail
          priority: 2
          label: 定位不充分，重试
    - name: 方案设计
      description: 设计修复方案，解决 else-if 链场景下 debug location 传递错误的问题
      isInitial: false
      isFinal: false
      steps:
        - name: 设计修复方案
          agent: compiler_fix-architect
          task: >
            基于已确认的根因，为 UnreachableBranchCheck else-if 链误报问题设计修复方案。


            根因摘要：

            - TranslateIfExpr::TranslateFalseBlock() 处理 else-if 链时，新建 falseBlock
            未正确设置 debug location

            - UnreachableBranchCheck::VisitFunc 中 block.GetDebugLocation()
            拿到的是外层 if 的起始行

            - 告警因此被报告到 line 3（main 函数起始行）而非实际 unreachable 的 else-if 分支


            请设计以下修复方案：


            方案A（精准修复）：

            - 在 TranslateIfExpr::TranslateFalseBlock() 中，为 else-if 链的 falseBlock
            正确设置 debug location

            - 使其指向 else-if 条件的起始位置而非外层 if 的起始位置


            方案B（告警层修复）：

            - 在 UnreachableBranchCheck::VisitFunc 中，当检测到 unreachable branch
            时，尝试从 branch condition 而非 block 取 debug location

            - 优先使用条件表达式中的位置信息


            方案C（混合方案）：

            - 同时在 CHIR 层修正 location 传播，并在告警层增加 fallback 逻辑


            对每个方案给出：

            - 修改的具体文件和行号范围

            - 修复的核心代码思路

            - 风险评估（对其他模块的影响）

            - 回归影响
          role: defender
        - name: 攻击修复方案
          agent: compiler_fix-breaker
          task: |
            以攻击者视角审查 compiler_fix-architect 提出的修复方案：

            1. 方案A：在 TranslateIfExpr 中设置 debug location 是否会影响其他使用该 block 的 pass？
            2. 方案B：从 branch condition 取位置是否会误报其他正常 unreachable 的情况？
            3. 方案C是否会引入过多的复杂性？
            4. 修复后是否会影响正常的 UnreachableBranch 告警（那些确实需要告警的情况）？
            5. 是否需要考虑增量编译场景下的影响？

            对每个风险项给出严重程度评估和具体触发条件。
          role: attacker
        - name: 评审修复方案
          agent: compiler_fix-judge
          task: |
            综合 compiler_fix-architect 的方案和 compiler_fix-breaker 的攻击，做出裁决：

            1. 推荐采用哪个方案（或组合方案）？
            2. fix-breaker 的攻击点是否需要在方案中补充处理？
            3. 方案是否足够完整可以进入实施阶段？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"代码修复|方案设计","summary":"推荐方案描述和判定理由，包含修改文件列表"}
          role: judge
      transitions:
        - to: 代码修复
          condition:
            verdict: pass
          priority: 1
          label: 方案通过，进入代码修复
        - to: 方案设计
          condition:
            verdict: fail
          priority: 2
          label: 方案不足，重新设计
      requireHumanApproval: true
    - name: 代码修复
      description: 实施代码修复
      isInitial: false
      isFinal: false
      steps:
        - name: 实施代码修复
          agent: compiler_fix-developer
          task: |
            根据 fix-judge 评审通过的修复方案，在 ../cangjie_compiler_947 源码中实施修复。

            修复要求：
            - 最小侵入性，不改变正常编译路径的行为
            - 修复后告警位置应指向实际的 unreachable else-if 条件行
            - 不引入新的编译问题或性能退化

            输出要求：
            - 贴出每个修改文件的完整 diff
            - 贴出修改后的编译验证命令和输出
            - 用复现用例验证修复效果
          role: defender
        - name: 审查修复代码
          agent: compiler_fix-hunter
          task: |
            以攻击者视角审查 fix-developer 提交的代码修复：

            1. 检查修复是否正确处理了所有 else-if 链变体
            2. 检查是否引入了新的问题（如影响其他 pass 的 block 行为）
            3. 验证修复后告警行号是否正确指向 else-if 条件行
            4. 检查是否有遗漏的类似模式（其他 if 相关 pass 是否有同样问题）

            输出要求：
            - 贴出审查的每个代码片段（含文件路径和行号）
            - 如果做了验证实验，贴出完整命令和输出
          role: attacker
        - name: 评审修复代码
          agent: compiler_fix-reviewer
          task: |
            综合 fix-developer 的修复代码和 fix-hunter 的审查意见，做出裁决：

            1. 修复代码是否正确解决了根因？
            2. fix-hunter 发现的问题是否需要在本轮修复？
            3. 代码质量是否达到合入标准？

            输出 JSON：
            {"verdict":"pass|fail|conditional_pass","next_state":"验证完成|代码修复|方案设计","summary":"评审结论"}
          role: judge
      transitions:
        - to: 验证完成
          condition:
            verdict: pass
          priority: 1
          label: 修复通过，进入验证
        - to: 代码修复
          condition:
            verdict: fail
          priority: 2
          label: 修复不足，重新实施
        - to: 方案设计
          condition:
            verdict: conditional_pass
          priority: 3
          label: 需重新设计方案
      requireHumanApproval: true
    - name: 验证完成
      description: 回归测试验证，确认修复有效且无副作用
      isInitial: false
      isFinal: true
      steps:
        - name: 运行回归测试
          agent: compiler_tester
          task: |
            对 UnreachableBranchCheck else-if 误报修复进行全面回归验证：

            1. 验证原始复现用例：告警行号应指向 else-if 条件行，而非 line 3
            2. 验证所有 stress-tester 构造的边界变体，确认告警行号均正确
            3. 运行编译器现有测试套件，确认无回归
            4. 验证正常 unreachable 场景（非 else-if）是否仍然正确告警

            输出要求：
            - 每个测试用例的完整源代码
            - 编译命令和告警输出的完整记录
            - 用表格列出所有测试结果
          role: defender
        - name: 审计代码规范
          agent: compiler_code-auditor
          task: |
            对修复涉及的代码变更进行编码规范审计：

            1. 检查新增代码是否符合仓颉编译器 C++ 编码规范
            2. 检查 debug location 设置是否正确
            3. 检查注释是否清晰说明修复意图
          role: judge
        - name: 最终裁决
          agent: compiler_fix-judge
          task: |
            综合回归测试结果和代码规范审计，给出最终裁决：

            1. 修复是否完全解决了 else-if 链告警位置误报问题？
            2. 是否存在回归风险？
            3. 给出最终修复总结报告

            输出 JSON：
            {"verdict":"pass|fail","summary":"最终修复总结，包含修改文件、修复方式、验证结论"}
          role: judge
      transitions: []
context:
  projectRoot: ../cangjie_compiler_947
  requirements: >
    修复 UnreachableBranchCheck 在 else-if 链场景下的告警位置误报问题。


    问题描述：

    - 当代码包含 else-if 链时（如 if/else if/else 结构），UnreachableBranchCheck 会触发告警

    - 但告警位置被错误地报告为外层 if 的起始行（line 3，即 main() 行）而非实际 unreachable 的 else-if 条件行


    根因（根据前期分析）：

    - TranslateIfExpr::TranslateFalseBlock() 处理 else-if 链时，新建 falseBlock 的 debug
    location 取自外层 IfExpr 而非内层 else-if 条件

    - UnreachableBranchCheck::VisitFunc 中 block.GetDebugLocation() 因此拿到了错误的位置


    核心文件（需进一步确认）：

    - UnreachableBranchCheck 实现文件

    - TranslateIfExpr::TranslateFalseBlock() 实现

    - CHIR 层 block 和 debug location 相关代码


    验收标准：

    1. else-if 链的告警行号指向实际的 else-if 条件行，而非外层 if 起始行

    2. 其他正常 unreachable 场景的告警行为不受影响

    3. 现有测试套件无回归
  codebase: src/StaticAnalysis/ 或相关目录（需 agent 确认）
  timeoutMinutes: 300
  skills:
    - build-cangjie
    - run-cangjie-tests
    - use-knowledge-base
