workflow:
  name: Issue-746 泛型枚举 pattern match 修复
  description: 修复泛型枚举 match 误报 unreachable warning 及 -O0/-O1 运行时命中错误分支的 Bug
  mode: state-machine
  maxTransitions: 50
  states:
    - name: 问题复现
      description: 构造最小复现用例，确认两个 Bug 可稳定触发
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: 构造最小复现用例
          agent: issue-reproducer
          task: >
            针对 Issue #746 构造最小可复现用例。


            问题：对泛型枚举进行 match 时，编译器误报 3 个 unreachable pattern 警告；

            且在 -O0/-O1 下运行时命中错误的 match 分支（-O2 下结果正确）。


            请在 ../cangjie_compiler 目录下：

            1. 创建 /tmp/issue746_repro.cj：定义 enum Color<T> { Red(T) | Green(T) |
            Blue(T) }，
               main 中构造 Color<Int64>.Red(42) 并用 match 匹配三个分支
            2. cjc -O0 编译，确认出现 unreachable pattern 警告

            3. 运行产物，确认命中错误分支（Red(42) 却输出 Green 或 Blue）

            4. cjc -O2 编译并运行，确认结果正确

            5. 记录每条命令及完整输出（stdout + stderr + 退出码）


            输出：完整源码 + 每步命令和输出 + -O0 vs -O2 对比结论
          role: defender
          skills:
            - use-knowledge-base
        - name: 构造边界变体
          agent: stress-tester
          task: |
            基于复现结论，构造边界变体：
            1. 不同类型参数（Int32、Float64、String）
            2. constructor 数量为 2、4、8（测试 tag 边界）
            3. 带 guard 条件的 pattern（case Red(v) where v > 0）
            4. 与非泛型枚举对比，确认非泛型枚举无此问题
            5. -O1 下行为是否与 -O0 一致

            每个变体：写出源码、编译运行（-O0 和 -O2）、记录完整输出、标注是否触发 Bug。
          role: defender
          skills:
            - use-knowledge-base
        - name: 复现阶段裁判
          agent: fix-judge
          task: |
            评审复现结果：
            1. 最小复现用例是否稳定触发两个 Bug？
            2. 边界变体是否充分？
            3. -O0/-O1 vs -O2 差异是否清晰？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"根因定位","summary":"复现结论摘要"}
          role: judge
      transitions:
        - to: 根因定位
          condition:
            verdict: pass
          priority: 1
          label: 复现确认
        - to: 问题复现
          condition:
            verdict: fail
          priority: 2
          label: 复现不充分，重试
    - name: 根因定位
      description: 精确定位 PatternUsefulness.cpp 和 AST2CHIR 中的逻辑错误
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 静态分析根因
          agent: code-hunter
          task: >
            精确定位 Issue #746 根因。已知嫌疑点：


            Bug 1 — PatternUsefulness.cpp unreachable 误报：

            - IsCoveredBy（约 L327）：疑似只比较 typeArgs 数量不比内容，导致不同 constructor 被误判互相覆盖

            - SplitWildcard（约 L914）：VarDecl pattern 处理时未对泛型枚举实例化


            Bug 2 — AST2CHIR 枚举 tag 生成运行时错误：

            - ImplUtils.h NeedSwitchContext（约 L75）：泛型枚举实例化上下文判断漏判，parentEnum 未更新

            - GenericInstantiationManagerImpl.cpp（约 L1411）：constructor tag
            值与泛型参数类型耦合


            请在 ../cangjie_compiler 源码中：

            1. 读取 src/Sema/PatternUsefulness.cpp，定位 IsCoveredBy 和 SplitWildcard
            精确行号

            2. 读取 src/CHIR/AST2CHIR/ImplUtils.h 及相关泛型实例化文件，定位 tag 生成错误

            3. 每个嫌疑点给出：精确文件路径+行号、错误代码片段、错误原因、正确逻辑


            输出：根因定位报告（文件路径、行号、代码片段、错误解释）
          role: defender
          skills:
            - use-knowledge-base
        - name: 根因挑战验证
          agent: code-auditor
          task: |
            独立验证 code-hunter 的根因定位：
            1. 独立阅读每个嫌疑文件和行号，验证逻辑错误分析是否正确
            2. 检查遗漏的代码路径（IsCoveredBy 调用链、tag 完整生成流程）
            3. 分析 -O2 下为何结果正确（Devirtualization/ConstPropagation 是否绕过了错误 tag 比较）
            4. 如有分析错误，给出修正

            输出：验证报告，确认或修正根因定位
          role: attacker
          skills:
            - use-knowledge-base
        - name: 根因定位裁判
          agent: fix-judge
          task: |
            综合两个 Agent 的分析，裁定根因定位是否准确：
            1. 分析是否一致？如有分歧，哪方更可信？
            2. 是否精确到具体行号和代码片段？
            3. 是否覆盖了所有 Bug 路径（静态误报 + 运行时错误分支）？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"修复方案设计","summary":"根因定位结论，含精确文件路径和行号"}
          role: judge
      transitions:
        - to: 修复方案设计
          condition:
            verdict: pass
          priority: 1
          label: 根因确认
        - to: 根因定位
          condition:
            verdict: fail
          priority: 2
          label: 根因不明确，重新定位
      requireHumanApproval: true
    - name: 修复方案设计
      description: 设计针对两处 Bug 的修复方案
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 设计修复方案
          agent: fix-architect
          task: |
            基于根因定位结论，设计完整修复方案：

            Bug 1 修复（PatternUsefulness.cpp）：
            - IsCoveredBy：如何正确比较泛型枚举 constructor 的覆盖性（需比较 typeArgs 内容）
            - SplitWildcard：如何在 VarDecl pattern 处理时正确实例化泛型枚举

            Bug 2 修复（AST2CHIR tag 生成）：
            - NeedSwitchContext：如何正确判断泛型枚举实例化的上下文切换
            - tag 生成：如何保证不同泛型参数的同名 constructor 获得正确唯一的 tag 值

            每个修复方案说明：修改文件和行号范围、修改前后代码对比、修复理论依据、潜在副作用
          role: defender
          skills:
            - use-knowledge-base
        - name: 方案安全性审查
          agent: design-breaker
          task: |
            对修复方案进行安全性审查：
            1. 修复是否会引入新的 Bug 或回归？
            2. 是否有边界情况未被覆盖（多重泛型参数、嵌套枚举、空枚举等）？
            3. Bug 1 和 Bug 2 的修复是否相互独立，还是存在依赖关系？
            4. 修复后 -O2 的优化路径是否仍然正确？
            5. 给出需要特别注意的风险点

            输出：安全性审查报告，列出风险点和建议
          role: attacker
          skills:
            - use-knowledge-base
        - name: 方案设计裁判
          agent: design-judge
          task: |
            评审修复方案和安全性审查结果：
            1. 修复方案是否完整覆盖了两个 Bug？
            2. 安全性审查发现的风险是否已在方案中处理？
            3. 方案是否足够清晰，可以直接指导代码实现？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"代码修复实现","summary":"方案评审结论"}
          role: judge
      transitions:
        - to: 代码修复实现
          condition:
            verdict: pass
          priority: 1
          label: 方案确认
        - to: 修复方案设计
          condition:
            verdict: fail
          priority: 2
          label: 方案不完整，重新设计
      requireHumanApproval: true
    - name: 代码修复实现
      description: 按方案修改源码并编译验证
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 实现代码修复
          agent: fix-developer
          task: |
            按照修复方案，在 ../cangjie_compiler 源码中实现修复：

            1. 修复 Bug 1（PatternUsefulness.cpp）：
               - 修改 IsCoveredBy，正确比较泛型枚举 constructor 的 typeArgs 内容
               - 修改 SplitWildcard，在 VarDecl pattern 处理时正确实例化泛型枚举

            2. 修复 Bug 2（AST2CHIR tag 生成）：
               - 修改 NeedSwitchContext，正确判断泛型枚举实例化的上下文切换
               - 修复 constructor tag 值生成，保证不同泛型参数的同名 constructor tag 唯一

            3. 每处修改后记录：修改的文件路径、行号、修改前后的完整代码片段

            4. 使用 build-cangjie 技能重新编译 cjc（至少编译 Sema 和 CHIR 模块）

            5. 编译成功后，运行 /tmp/issue746_repro.cj 验证：
               - -O0 下不再出现 unreachable 警告
               - -O0 下运行时命中正确分支
               - -O2 下结果仍然正确

            输出：修改的完整代码片段 + 编译结果 + 验证测试输出
          role: defender
          skills:
            - use-knowledge-base
            - build-cangjie
        - name: 代码审计
          agent: fix-reviewer
          task: |
            审计 fix-developer 的代码修改：
            1. 逐行审查每处修改，确认逻辑正确性
            2. 检查是否有遗漏的 null 检查、边界条件处理
            3. 确认修改风格与周边代码一致
            4. 验证修改是否完整覆盖了根因定位中的所有问题点
            5. 如发现问题，给出具体的修改建议

            输出：代码审计报告，列出问题（如有）和改进建议
          role: attacker
          skills:
            - use-knowledge-base
        - name: 实现阶段裁判
          agent: fix-judge
          task: |
            评审代码修复实现和审计结果：
            1. 修复是否正确实现了方案中的所有要点？
            2. 代码审计发现的问题是否已修正？
            3. 编译是否成功？初步验证是否通过？

            输出 JSON：
            {"verdict":"pass|fail","next_state":"回归验证","summary":"实现评审结论"}
          role: judge
      transitions:
        - to: 回归验证
          condition:
            verdict: pass
          priority: 1
          label: 实现确认
        - to: 代码修复实现
          condition:
            verdict: fail
          priority: 2
          label: 实现有问题，重新修复
      requireHumanApproval: true
    - name: 回归验证
      description: 全面验证修复效果，确保无回归
      isInitial: false
      isFinal: false
      position:
        x: 900
        y: 200
      steps:
        - name: 全面回归测试
          agent: tester
          task: |
            对修复后的 cjc 进行全面回归验证：

            1. 验证 Issue #746 修复效果：
               - 运行 /tmp/issue746_repro.cj（-O0、-O1、-O2），确认三个优化级别均正确
               - 运行边界变体测试用例，确认所有变体均正确
               - 确认不再出现 unreachable pattern 误报

            2. 运行相关单元测试（使用 run-cangjie-tests 技能）：
               - PatternUsefulness 相关测试
               - 泛型枚举相关测试
               - CHIR 优化相关测试

            3. 运行更广泛的回归测试套件，确认无新增失败

            4. 记录所有测试命令和完整输出

            输出：完整测试报告，包含每个测试用例的命令和结果
          role: defender
          skills:
            - use-knowledge-base
            - run-cangjie-tests
        - name: 压力测试
          agent: stress-tester
          task: |
            对修复后的 cjc 进行压力测试，尝试找出潜在回归：
            1. 构造更复杂的泛型枚举 match 场景（多层嵌套、多个泛型参数）
            2. 测试与其他语言特性的组合（泛型函数、接口实现、继承）
            3. 测试大量 constructor 的枚举（10+个）
            4. 测试 match 的完整性检查（故意漏掉某个分支，确认编译器正确报错）

            输出：压力测试报告，标注是否发现新问题
          role: attacker
          skills:
            - use-knowledge-base
        - name: 最终裁判
          agent: fix-judge
          task: |
            综合所有验证结果，给出最终裁定：
            1. Issue #746 的两个 Bug 是否均已修复？
            2. 回归测试是否全部通过？
            3. 压力测试是否发现新问题？
            4. 修复质量是否达到提交 PR 的标准？

            引用具体的测试数据和代码审计结论。

            输出 JSON：
            {"verdict":"pass|fail","next_state":"验证完成","summary":"最终验证结论，含修改文件列表、修复方式、测试结论"}
          role: judge
      transitions:
        - to: 验证完成
          condition:
            verdict: pass
          priority: 1
          label: 验证通过
        - to: 代码修复实现
          condition:
            verdict: fail
          priority: 2
          label: 验证失败，重新修复
      requireHumanApproval: false
    - name: 验证完成
      description: 修复完成，生成修复报告
      isInitial: false
      isFinal: true
      position:
        x: 1100
        y: 200
      steps:
        - name: 生成修复报告
          agent: documentation-writer
          task: |
            基于整个修复流程的所有输出，生成完整的修复报告：

            1. 问题描述：Issue #746 的现象、影响范围、触发条件
            2. 根因分析：两个 Bug 的精确位置（文件路径、行号）和错误逻辑
            3. 修复方案：每处修改的代码对比（before/after）
            4. 验证结论：测试覆盖情况和结果
            5. PR 描述草稿：可直接用于提交 PR 的描述文本

            输出 JSON：
            {"verdict":"pass","next_state":"验证完成","summary":"修复报告已生成，包含修改文件列表、修复方式、验证结论"}
          role: defender
      transitions: []
context:
  projectRoot: ../cangjie_compiler
  requirements: |
    修复 Issue #746：泛型枚举在 match 表达式中存在两个相关 Bug：

    Bug 1 — 静态分析误报（PatternUsefulness.cpp）：
    对泛型枚举（如 enum Color<T> { Red(T) | Green(T) | Blue(T) }）进行 match 时，
    编译器误报 3 个 unreachable pattern 警告。根因疑似在 IsCoveredBy 函数中，
    对泛型枚举 constructor 的覆盖性判断只比较 typeArgs 数量而不比较具体类型内容，
    导致不同 constructor 被误判为互相覆盖。

    Bug 2 — 运行时错误分支（AST2CHIR 枚举 tag 生成）：
    在 -O0/-O1 下，match 运行时命中错误分支（如构造 Red(42) 却执行 Green 分支）；
    -O2 下结果正确（Devirtualization/ConstPropagation 绕过了错误的 tag 比较）。
    根因疑似在 ImplUtils.h 的 NeedSwitchContext 函数漏判，导致泛型枚举实例化时
    parentEnum 未正确更新，constructor tag 值与泛型参数类型耦合。

    核心文件：
    - src/Sema/PatternUsefulness.cpp（IsCoveredBy L327、SplitWildcard L914）
    - src/CHIR/AST2CHIR/ImplUtils.h（NeedSwitchContext L75）
    - src/Sema/GenericInstantiationManagerImpl.cpp（约 L1411）

    验收标准：
    1. 不再误报 unreachable pattern 警告
    2. -O0/-O1/-O2 下 match 均命中正确分支
    3. 现有测试套件无回归
  codebase: src/Sema/
  timeoutMinutes: 300
  skills:
    - use-knowledge-base
    - build-cangjie
    - run-cangjie-tests
