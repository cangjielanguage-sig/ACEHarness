workflow:
  name: mimalloc 集成验证与优化
  description: 基于已完成的设计和实现（run-20260303171555714），验证功能和性能，必要时优化
  mode: state-machine
  maxTransitions: 50

  states:
    - name: 设计方案
      description: 设计 mimalloc 集成技术方案（已完成）
      requireHumanApproval: true
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: 设计集成方案
          agent: architect
          task: >
            设计 mimalloc 集成方案，包括：
            1. CMake 构建配置（如何引入 mimalloc 依赖）
            2. 初始化时机和方式（main.cpp 还是编译器启动阶段）
            3. 开关控制机制（环境变量或编译选项）
            4. 与现有 Arena 分配器的协作策略
            5. 性能测试方法（如何正确测量编译器本身的性能）
            提供 2-3 个备选方案并推荐最佳方案。
          role: defender
          skills:
            - use-knowledge-base
        - name: 攻击设计方案
          agent: design-breaker
          task: 分析设计方案，找出所有可能的缺陷和风险
          role: attacker
          skills:
            - use-knowledge-base
        - name: 评审方案
          agent: design-judge
          task: >
            评审集成方案的可行性和完整性。
            输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "实现集成|设计方案",
              "issues": [],
              "summary": "..."
            }
            ```
          role: judge
      transitions:
        - to: 实现集成
          condition:
            verdict: pass
          priority: 1
          label: 方案通过
        - to: 实现集成
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件通过
        - to: 设计方案
          condition:
            verdict: fail
          priority: 3
          label: 方案需优化

    - name: 实现集成
      description: 实现 mimalloc 集成代码（已完成）
      type: normal
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 编写集成代码
          agent: developer
          task: >
            根据设计方案实现 mimalloc 集成：
            1. 修改 CMakeLists.txt 添加 mimalloc 依赖
            2. 创建 cmake/optional/CangjieMimalloc.cmake 模块
            3. 在 main.cpp 添加初始化代码
            4. 实现开关控制逻辑
            5. 编写单元测试验证初始化流程
            使用 build-cangjie skill 进行构建验证。
          role: defender
          skills:
            - build-cangjie
            - use-knowledge-base
        - name: 代码审查
          agent: code-hunter
          task: >
            审查集成代码，重点检查：
            1. 内存安全问题（初始化顺序、线程安全）
            2. 资源泄漏风险
            3. 错误处理是否完善
            4. 是否正确处理 mimalloc 不可用的情况
          role: attacker
          skills:
            - use-knowledge-base
        - name: 验证实现
          agent: code-judge
          task: >
            验证代码实现质量。
            输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "功能验证|问题修复|设计方案",
              "issues": [],
              "summary": "..."
            }
            ```
          role: judge
      transitions:
        - to: 功能验证
          condition:
            verdict: pass
          priority: 1
          label: 实现通过
        - to: 功能验证
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有条件通过
        - to: 问题修复
          condition:
            verdict: fail
            issueTypes: [implementation, security]
          priority: 3
          label: 实现问题需修复
        - to: 设计方案
          condition:
            verdict: fail
            issueTypes: [design]
          priority: 4
          label: 设计问题需重做

    - name: 功能验证
      description: 验证 mimalloc 集成的基本功能
      requireHumanApproval: true
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 功能测试
          agent: tester
          task: >
            验证 mimalloc 集成的基本功能：
            1. 构建 CANGJIE_USE_MIMALLOC=ON 和 OFF 两个版本
            2. 验证开关控制是否生效
            3. 运行现有测试套件，确保无回归
            4. 验证编译器能正常编译简单项目
            使用 build-cangjie 和 run-cangjie-tests skills。
          role: defender
          skills:
            - build-cangjie
            - run-cangjie-tests
        - name: 功能审计
          agent: code-auditor
          task: >
            审计功能测试结果和代码质量。
            输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "性能测试|问题修复",
              "issues": [],
              "summary": "..."
            }
            ```
          role: judge
      transitions:
        - to: 性能测试
          condition:
            verdict: pass
          priority: 1
          label: 功能正常
        - to: 性能测试
          condition:
            verdict: conditional_pass
          priority: 2
          label: 有小问题但可继续
        - to: 问题修复
          condition:
            verdict: fail
          priority: 3
          label: 功能问题需修复

    - name: 性能测试
      description: 测试 mimalloc 的性能收益
      requireHumanApproval: true
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 性能基准测试
          agent: stress-tester
          task: >
            执行正确的性能测试：
            1. 分别构建 mimalloc ON/OFF 两个版本的编译器
            2. 用这两个编译器编译相同的中等规模项目（如 cjpm）
            3. 对比编译时间（使用 hyperfine 多次测量）
            4. 对比峰值内存（使用 /usr/bin/time -v）
            5. 测试内存归还效率（编译完成后 RSS 变化）
            6. 压力场景：大文件编译、并行编译、连续编译
            使用 build-cangjie 和 profile-cangjie skills。
          role: attacker
          skills:
            - build-cangjie
            - profile-cangjie
        - name: 性能仲裁
          agent: performance-judge
          task: >
            仲裁性能测试结果，给出客观结论。
            评估标准：
            - 编译时间提升 >5% 为显著收益
            - 内存使用降低 >5% 为显著收益
            - 如果收益不足，分析根因（Arena 分配模式？分配频率？）
            输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "完成|问题修复",
              "performance_gain": {
                "compile_time": "-X%",
                "memory_usage": "-Y%"
              },
              "issues": [],
              "summary": "..."
            }
            ```
          role: judge
      transitions:
        - to: 完成
          condition:
            verdict: pass
          priority: 1
          label: 性能达标
        - to: 完成
          condition:
            verdict: conditional_pass
          priority: 2
          label: 收益有限但可接受
        - to: 问题修复
          condition:
            verdict: fail
          priority: 3
          label: 需要优化

    - name: 问题修复
      description: 修复发现的问题或进行优化
      type: normal
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 400
      steps:
        - name: 设计修复方案
          agent: fix-architect
          task: >
            根据发现的问题设计修复方案：
            - 如果是功能问题，设计修复方案
            - 如果是性能问题，设计优化方案（如调整 mimalloc 配置参数、热点路径优化）
            提供具体的修复步骤和预期效果。
          role: defender
          skills:
            - use-knowledge-base
        - name: 攻击修复方案
          agent: fix-breaker
          task: >
            攻击修复方案，验证方案的完整性：
            1. 方案是否真正解决根因
            2. 是否引入新问题
            3. 是否有更好的替代方案
          role: attacker
        - name: 评审修复方案
          agent: fix-judge
          task: >
            评审修复方案。
            输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "实施修复|问题修复",
              "issues": [],
              "summary": "..."
            }
            ```
          role: judge
        - name: 实施修复
          agent: fix-developer
          task: >
            实施修复方案，编写回归测试。
            使用 build-cangjie 和 run-cangjie-tests skills 验证修复效果。
          role: defender
          skills:
            - build-cangjie
            - run-cangjie-tests
        - name: 审查修复代码
          agent: fix-hunter
          task: >
            审查修复代码，验证修复有效性，发现潜在问题。
          role: attacker
          skills:
            - use-knowledge-base
        - name: 验证修复结果
          agent: fix-reviewer
          task: >
            验证修复结果。
            输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "功能验证|性能测试|问题修复",
              "issues": [],
              "summary": "..."
            }
            ```
          role: judge
      transitions:
        - to: 功能验证
          condition:
            verdict: pass
            issueTypes: [implementation, security]
          priority: 1
          label: 功能修复完成，重新验证
        - to: 性能测试
          condition:
            verdict: pass
            issueTypes: [performance]
          priority: 2
          label: 性能优化完成，重新测试
        - to: 功能验证
          condition:
            verdict: conditional_pass
          priority: 3
          label: 有条件通过，重新验证
        - to: 问题修复
          condition:
            verdict: fail
          priority: 4
          label: 修复不充分，继续修复

    - name: 完成
      description: 集成完成，生成总结报告
      type: normal
      isInitial: false
      isFinal: true
      position:
        x: 900
        y: 200
      steps:
        - name: 生成总结报告
          agent: architect
          task: >
            生成 mimalloc 集成总结报告，包括：
            1. 集成方案概述（引用历史文档）
            2. 实际性能数据（编译时间、内存使用对比）
            3. 遇到的问题和解决方案
            4. 代码变更清单
            5. 后续建议（是否值得继续优化，优化方向）
            6. 合并就绪状态评估
          role: defender
      transitions: []

  issueRouting:
    - pattern: "架构|设计缺陷|方案问题|集成策略"
      targetState: 设计方案
      issueType: design
      priority: 1
    - pattern: "Bug|崩溃|内存泄漏|初始化失败|编译错误"
      targetState: 问题修复
      issueType: implementation
      priority: 2
    - pattern: "性能不足|性能退化|内存占用高|编译慢"
      targetState: 问题修复
      issueType: performance
      priority: 3
    - pattern: "安全漏洞|UAF|double free|线程安全"
      targetState: 问题修复
      issueType: security
      priority: 4

context:
  projectRoot: ../cangjie_compiler
  requirements: >
    基于 run-20260303171555714 已完成的设计和实现，验证 mimalloc 集成的功能和性能。
    重点关注：
    1. 正确的性能测试方法（测试编译器本身，而非编译产物）
    2. 与现有 Arena 分配器的协作
    3. 性能收益评估（编译时间、内存使用）
    历史结论：代码已实现并通过评审，但性能测试方法有误，需要重新验证。
  codebase: ../cangjie_compiler/src
  timeoutMinutes: 180
  skills:
    - build-cangjie
    - run-cangjie-tests
    - profile-cangjie
    - use-knowledge-base

judgeConfig:
  regressionThreshold: 0.05
