workflow:
  name: Issue-701 属性setter空指针修复
  description: 修复 TypeCheckUtil.cpp 中 GetUsableSetterForProperty()
    在泛型特化扩展符号未完全注册时返回 nullptr 导致 ICE 的问题
  mode: state-machine
  maxTransitions: 50
  states:
    - name: 问题复现
      description: 构造最小复现用例，确认 ICE 可稳定触发
      isInitial: true
      isFinal: false
      position:
        x: 100
        y: 200
      steps:
        - name: 构造最小复现用例
          agent: issue-reproducer
          task: >
            针对 Issue #701 构造最小可复现用例。


            问题描述：cjc 编译器在 main 函数位于文件顶部时，对泛型特化扩展的只读属性赋值会触发 ICE（illegal hardware
            instruction，返回 -4）；而 main 在文件底部时能正确报错。


            复现代码（触发 ICE）：

            ```cj

            main(): Int64 {
                var b = B<Int32>()
                b.a = 0
                return 0
            }

            class A {}

            extend A {
                public prop a: Int64 { get() { return 1 } }
            }

            extend A {
                public prop b: Int64 { get() { return 2 } }
            }

            class B<T> {}

            extend B<Int32> {
                public prop a: Int64 { get() { return 1 } }
            }

            ```


            请在 ../cangjie_compiler 目录下：

            1. 创建上述复现文件 /tmp/issue701_repro.cj

            2. 使用 cjc 编译并确认触发 ICE（返回 -4）

            3. 将 main 移至文件底部，确认编译器正确报错

            4. 记录两种情况的完整编译输出

            5. 输出最小复现用例和确认结论


            输出要求（必须包含完整过程记录）：
            - 贴出完整的测试源码
            - 贴出每条编译命令及完整终端输出（stdout + stderr + 退出码）
            - 对比实验：正常情况和异常情况的代码与输出都要完整贴出
            - 不要只写结论，每个实验步骤都必须有完整的命令和输出记录
          role: defender
          skills:
            - use-knowledge-base
        - name: 构造边界变体
          agent: stress-tester
          task: |
            基于 issue-reproducer 的复现结论，构造更多边界变体以全面覆盖问题范围：

            1. 多个泛型参数的特化扩展（extend B<Int32, String>）
            2. 嵌套泛型类的属性赋值
            3. 多文件编译场景（main 和 extend 分属不同文件）
            4. 同一类有多个 extend 块时的顺序影响

            对每个变体记录：是否触发 ICE、错误信息、返回码。

            输出要求（必须包含完整测试数据）：
            - 每个变体的完整源代码（不要省略）
            - 编译/运行的完整命令
            - 每条命令的完整终端输出（stdout + stderr + 退出码）
            - 用表格列出所有变体的测试结果（输入参数、是否崩溃、错误信息、退出码）
            - 标注哪些是预期行为、哪些是异常行为
          role: attacker
        - name: 确认复现结论
          agent: fix-judge
          task: |
            评审 issue-reproducer 和 stress-tester 的复现结论：

            1. 确认最小复现用例是否稳定触发 ICE
            2. 确认问题边界（哪些场景触发 ICE，哪些不触发）
            3. 判断是否可以进入根因定位阶段

            评审要求：
            - 逐条引用复现报告中的具体实验数据（命令和输出）作为判断依据
            - 对 stress-tester 的每个变体结果给出确认或质疑
            - 不能空泛评价，必须引用具体证据

            输出 JSON：
            {"verdict":"pass|fail","next_state":"根因定位|问题复现","summary":"判定理由"}
          role: judge
      transitions:
        - to: 根因定位
          condition:
            verdict: pass
          priority: 1
          label: 复现确认，进入根因定位
        - to: 问题复现
          condition:
            verdict: fail
          priority: 2
          label: 复现失败，重试
      requireHumanApproval: false
    - name: 根因定位
      description: 精确定位 TypeCheckUtil.cpp 空指针路径和触发条件
      isInitial: false
      isFinal: false
      position:
        x: 300
        y: 200
      steps:
        - name: 定位空指针路径
          agent: fix-hunter
          task: >
            精确定位 Issue #701 的根因代码路径。


            已知信息：

            - 问题文件：src/Sema/TypeCheckUtil.cpp

            - 关键函数：GetUsableSetterForProperty()（约 L509-522）

            - 调用方：src/Sema/TypeCheckReference.cpp ~L1200


            GetUsableSetterForProperty 实现：

            ```cpp

            Ptr<FuncDecl> GetUsableSetterForProperty(PropDecl& pd)

            {
                CJC_ASSERT(pd.isVar);
                Ptr<FuncDecl> setter = nullptr;
                auto cd = DynamicCast<ClassDecl*>(pd.outerDecl);
                if (pd.setters.empty()) {
                    if (cd) {
                        setter = FindValidPropAccessor(*cd, false, pd.identifier);
                    }
                } else {
                    setter = pd.setters[0].get();
                }
                return setter;  // 可能返回 nullptr
            }

            ```


            调用方（TypeCheckReference.cpp ~L1196-1201）：

            ```cpp

            auto pd = StaticCast<PropDecl*>(leftPartTarget);

            if (!pd || !pd->isVar) { return; }

            auto setter = GetUsableSetterForProperty(*pd);

            if (setter && setter->HasAnno(AnnotationKind::DEPRECATED)) {

            ```


            请在 ../cangjie_compiler 源码中：

            1. 确认 L1200 之后是否有对 setter 为 nullptr 时仍继续处理的代码路径

            2. 分析 pd.isVar 在泛型特化扩展中的赋值时机（前向引用时是否为 true）

            3. 追踪 FindValidPropAccessor 在符号未完全注册时的返回值

            4. 确认 ICE 的精确触发点（哪一行解引用了 nullptr）

            5. 分析为何 main 在后时能正确走到诊断路径


            输出要求（必须包含完整分析过程）：
            - 贴出每个关键代码片段（含文件路径和行号）
            - 贴出搜索命令和结果（如 grep 查找所有调用点）
            - 分析推理过程不能跳步，每个结论都要有代码证据支撑
            - 如果做了编译实验，贴出完整命令和输出
          role: defender
          skills:
            - use-knowledge-base
        - name: 攻击定位结论
          agent: fix-breaker
          task: |
            以攻击者视角审查 fix-hunter 的根因定位结论：

            1. 质疑定位的精确性：是否还有其他可能的 nullptr 解引用路径？
            2. 检查 pd.isVar 的判断逻辑是否完整覆盖泛型特化场景
            3. 验证"前向引用"假设：是否真的是符号注册时机问题，还是另有原因？
            4. 是否存在多个触发路径（不只是 L1200）？

            输出要求：
            - 每个质疑点必须引用具体的代码位置（文件路径+行号）
            - 如果做了验证实验，贴出完整命令和输出
            - 不能空泛质疑，必须有代码证据或实验数据支撑
          role: attacker
        - name: 确认根因
          agent: fix-judge
          task: |
            综合 fix-hunter 的定位结论和 fix-breaker 的质疑，做出裁决：

            1. 根因是否已精确定位到具体代码行？
            2. fix-breaker 的质疑是否有效，是否需要补充分析？
            3. 是否可以进入方案设计阶段？

            评审要求：
            - 逐条回应 fix-breaker 的质疑，给出确认或驳回理由
            - 引用 fix-hunter 报告中的具体代码片段和分析数据作为依据
            - 不能空泛评价，必须引用具体证据

            输出 JSON：
            {"verdict":"pass|fail","next_state":"方案设计|根因定位","summary":"判定理由，包含确认的根因描述"}
          role: judge
      transitions:
        - to: 方案设计
          condition:
            verdict: pass
          priority: 1
          label: 根因确认，进入方案设计
        - to: 根因定位
          condition:
            verdict: fail
          priority: 2
          label: 定位不充分，重试
    - name: 方案设计
      description: 设计最小侵入性修复方案
      isInitial: false
      isFinal: false
      position:
        x: 500
        y: 200
      steps:
        - name: 设计修复方案
          agent: fix-architect
          task: >
            基于已确认的根因，为 Issue #701 设计修复方案。


            根因摘要：

            - TypeCheckUtil.cpp GetUsableSetterForProperty() 在泛型特化扩展符号未完全注册时返回
            nullptr

            - TypeCheckReference.cpp ~L1200 调用方未对 nullptr 做防护，导致 ICE


            请设计以下两个层次的修复方案并给出推荐：


            方案A（快速修复）：

            - 在 TypeCheckReference.cpp 调用方加 nullptr 检查

            - 当 setter 为 nullptr 且 pd 是只读属性时，发出诊断错误而非继续处理


            方案B（根本修复）：

            - 在 Sema 阶段对泛型特化扩展采用两遍扫描

            - 第一遍收集所有 extend 定义，第二遍再做赋值合法性检查

            - 消除编译顺序依赖


            对每个方案给出：修改文件、修改范围、风险评估、回归影响。
          role: defender
          skills:
            - use-knowledge-base
        - name: 攻击修复方案
          agent: fix-breaker
          task: >
            以攻击者视角审查 fix-architect 提出的修复方案：


            1. 方案A 的 nullptr 检查是否覆盖了所有调用点（TypeCheckReference.cpp 还有 L1135、L1155
            两处调用）？

            2. 方案B 的两遍扫描是否会引入新的性能问题或破坏现有编译流程？

            3. 两个方案是否都能正确处理多文件编译场景？

            4. 修复后是否可能引入新的 ICE 或错误诊断？

            5. 是否有遗漏的边界情况（如 extend 在不同 package 中）？


            输出要求：
            - 每个攻击点必须引用具体的代码位置或实验数据
            - 如果做了验证实验，贴出完整命令和输出
            - 对每个风险项给出严重程度评估和具体的触发条件
          role: attacker
        - name: 评审修复方案
          agent: fix-judge
          task: |
            综合 fix-architect 的方案和 fix-breaker 的攻击，做出裁决：

            1. 推荐采用哪个方案（或组合方案）？
            2. fix-breaker 的攻击点是否需要在方案中补充处理？
            3. 方案是否足够完整可以进入实施阶段？

            评审要求：
            - 逐条回应 fix-breaker 的攻击点，给出确认或驳回理由
            - 引用方案设计中的具体修改内容作为依据
            - 对有争议的问题提供多角度分析

            输出 JSON：
            {"verdict":"pass|fail","next_state":"代码修复|方案设计","summary":"推荐方案描述和判定理由"}
          role: judge
      transitions:
        - to: 代码修复
          condition:
            verdict: pass
          priority: 1
          label: 方案通过，进入代码修复
        - to: 方案设计
          condition:
            verdict: fail
          priority: 2
          label: 方案不足，重新设计
      requireHumanApproval: true
    - name: 代码修复
      description: 实施最小侵入性代码修复
      isInitial: false
      isFinal: false
      position:
        x: 700
        y: 200
      steps:
        - name: 实施代码修复
          agent: fix-developer
          task: >
            根据 fix-judge 评审通过的修复方案，在 ../cangjie_compiler 源码中实施修复。


            核心修复目标：

            1. 修复 src/Sema/TypeCheckReference.cpp 中所有调用
            GetUsableSetterForProperty() 的位置（L1135、L1155、L1200），确保 nullptr
            时发出正确诊断

            2. 如方案包含两遍扫描，修改 src/Sema/TypeCheckUtil.cpp 或相关调度逻辑


            修复要求：

            - 最小侵入性，不改变正常编译路径的行为

            - 错误诊断信息应与 main 在后时的报错信息一致

            - 添加必要的注释说明修复意图

            - 不引入新的内存安全问题


            输出要求（必须包含完整修改记录）：
            - 贴出每个修改文件的完整 diff
            - 贴出修改后的编译验证命令和输出
            - 用复现用例验证修复效果，贴出完整命令和输出
          role: defender
          skills:
            - use-knowledge-base
        - name: 审查修复代码
          agent: fix-hunter
          task: |
            以攻击者视角审查 fix-developer 提交的代码修复：

            1. 检查所有 GetUsableSetterForProperty() 调用点是否都已修复（L1135、L1155、L1200）
            2. 验证新增的 nullptr 检查逻辑是否正确（条件判断、诊断信息）
            3. 检查是否引入了新的空指针风险或内存安全问题
            4. 验证修复是否覆盖了 stress-tester 发现的所有边界变体
            5. 检查是否有遗漏的相似模式（GetUsableGetterForProperty 是否有同样问题）

            输出要求：
            - 贴出审查的每个代码片段（含文件路径和行号）
            - 如果做了验证实验，贴出完整命令和输出
            - 每个发现的问题都要有具体的代码位置和触发条件
          role: attacker
        - name: 评审修复代码
          agent: fix-reviewer
          task: |
            综合 fix-developer 的修复代码和 fix-hunter 的审查意见，做出裁决：

            1. 修复代码是否正确解决了根因？
            2. fix-hunter 发现的问题是否需要在本轮修复？
            3. 代码质量是否达到合入标准？

            评审要求：
            - 逐条回应 fix-hunter 的审查发现，给出确认或驳回理由
            - 引用具体的代码 diff 和测试输出作为依据

            输出 JSON：
            {"verdict":"pass|fail|conditional_pass","next_state":"验证完成|代码修复|方案设计","summary":"评审结论"}
          role: judge
      transitions:
        - to: 验证完成
          condition:
            verdict: pass
          priority: 1
          label: 修复通过，进入验证
        - to: 代码修复
          condition:
            verdict: fail
          priority: 2
          label: 修复不足，重新实施
        - to: 方案设计
          condition:
            verdict: conditional_pass
          priority: 3
          label: 需重新设计方案
      requireHumanApproval: true
    - name: 验证完成
      description: 回归测试验证，确认修复有效且无副作用
      isInitial: false
      isFinal: true
      position:
        x: 900
        y: 200
      steps:
        - name: 运行回归测试
          agent: tester
          task: |
            对 Issue #701 的修复进行全面回归验证：

            1. 验证原始复现用例（main 在前）：应产生正确的诊断错误，不再 ICE
            2. 验证 main 在后的用例：诊断错误信息应与修复前一致
            3. 验证两种情况的错误信息完全相同
            4. 运行 stress-tester 构造的所有边界变体，确认均无 ICE
            5. 运行编译器现有测试套件，确认无回归

            输出要求（必须包含完整测试数据）：
            - 每个测试用例的完整源代码
            - 编译/运行的完整命令和终端输出（stdout + stderr + 退出码）
            - 用表格列出所有测试结果（用例名、预期结果、实际结果、是否通过）
            - 测试套件的运行命令和完整输出摘要
          role: defender
        - name: 审计修复代码规范
          agent: code-auditor
          task: |
            对修复涉及的代码变更进行编码规范审计：

            1. 检查新增代码是否符合仓颉编译器 C++ 编码规范
            2. 检查错误诊断信息的格式是否与现有诊断一致
            3. 检查注释是否清晰说明了修复意图
            4. 检查是否需要更新相关文档或注释

            输出规范审计报告。
          role: judge
        - name: 最终裁决
          agent: fix-judge
          task: |
            综合回归测试结果和代码规范审计，给出最终裁决：

            1. 修复是否完全解决了 Issue #701？
            2. 是否存在回归风险？
            3. 代码是否符合合入标准？
            4. 给出最终修复总结报告

            评审要求：
            - 引用回归测试的具体测试结果数据
            - 引用代码审计的具体发现
            - 最终总结需包含：修改的文件列表、修复方式、关键测试结论

            输出 JSON：
            {"verdict":"pass|fail","next_state":"验证完成","summary":"最终修复总结，包含修改文件、修复方式、验证结论"}
          role: judge
      transitions: []
context:
  projectRoot: ../cangjie_compiler
  requirements: |
    修复 Issue #701：cjc 不同的 main 函数位置导致编译结果不一致。

    问题根因：TypeCheckUtil.cpp 的 GetUsableSetterForProperty() 在处理泛型特化扩展
    （extend B<Int32>）时，若该扩展的符号尚未完全注册到符号表（main 在前时发生前向引用），
    会返回 nullptr。TypeCheckReference.cpp ~L1200 的调用方未对 nullptr 做防护，
    直接解引用导致 ICE（SIGILL，返回 -4）。

    期望行为：无论 main 函数位于文件何处，编译器应产生相同的诊断错误，不得出现 ICE。

    核心文件：
    - src/Sema/TypeCheckUtil.cpp（GetUsableSetterForProperty，L509-522）
    - src/Sema/TypeCheckReference.cpp（调用方，L1135/L1155/L1200）
    - src/Sema/TypeCheckExtend.cpp（CheckExtendGenerics，泛型扩展处理）

    验收标准：
    1. main 在前和 main 在后两种情况产生完全相同的诊断错误
    2. 不出现 ICE（返回码不为 -4）
    3. 现有测试套件无回归
  codebase: src/Sema/
  timeoutMinutes: 300
  skills:
    - use-knowledge-base
    - build-cangjie
    - run-cangjie-tests
