      - `FuncDecl` 节点必须保留（被 `globalCache`、`AST2CHIRCheck` 引用），但
      `FuncBody::body`（`OwnedPtr<Block>`，即实际代码块）在翻译完成后不再被任何代码路径访问

      - `AST2CHIRCheck`
