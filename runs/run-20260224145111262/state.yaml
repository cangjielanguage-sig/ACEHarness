      - `GlobalDeclAnalysis` 访问 `funcBody->paramLists`（参数列表），但不访问
      `funcBody->body`（代码块）

      - 并行翻译时每个函数的 body 只被一个线程读取，释放不存在竞争


      具体做法：在 `TranslateAllDecls`（Step 4）中，每翻译完一个函数，立即
      `funcBody->body.reset()`；每翻译完一个全局变量初始化，立即 `initializer.reset()`。这能在
      lowering 过程中逐步释放 60-80% 的 AST 内存。


      这个方案（A-3）和 v2 方案完全互补：A-3 在 Step 4 中逐步释放函数体，v2 在 CHIR
