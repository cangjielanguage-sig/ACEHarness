   path: harmonyos-requirement-analysis
   description: "当遇到鸿蒙应用开发需求时，首先使用此 Skill 进行需求技术化分析，将业务需求转换为具体的技术实现点，识别需要的 UI 组件、数据结构和交互方式。分析完成后，先使用 skill-B 中的仓颉语言 skills 进行开发，然后再使用 L1/L3 查询和构建流程。"
