# AceHarness Skills 配置
# 描述所有可用的 skills，每个 skill 对应 .claude/skills/ 下的一个目录

skills:
 - name: build-cangjie
   path: build-cangjie
   description: "仓颉编译器构建。【触发场景】build/编译 cjc/runtime/stdlib/stdx/cjpm/cjfmt/cjlint/cjcov/cjlsp、搭建编译环境、重新编译、用 cjc 编译。【注意】首次构建需完整步骤：1) 依次构建 runtime+stdlib+stdx 并 install；2) source output/envsetup.sh；3) 验证：cjc hello.cj。后续增量编译只需 ninja cjc。输出在 cangjie_compiler/output/。支持 linux/mac x86_64/aarch64。"
   tags:
     - 构建
     - 编译器
     - 仓颉
     - 工具链
   platforms:
     - linux_x86_64
     - linux_aarch64
     - mac_x86_64
     - mac_aarch64
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: run-cangjie-tests
   path: run-cangjie-tests
   description: "仓颉测试用例执行。【触发场景】test case/测试用例、testsuite/testlist、HLT/LLT/cjcov/LSP。【注意】依赖 CANGJIE_HOME 环境变量。参数：-j 并行、--timeout 超时、-pFAIL 只显失败、--retry 重试、--fail_exit 失败退码。"
   tags:
     - 测试
     - 编译器
     - 仓颉
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: profile-cangjie
   path: profile-cangjie
   description: "仓颉编译器性能分析。【触发场景】profile-compile-time、profile-compile-memory、.prof 报告、编译瓶颈。【注意】需先构建 compiler，直接用 --profile 标志无需重编译。"
   tags:
     - 性能分析
     - 编译器
     - 仓颉
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: cangjie_compiler_knowledge
   path: cangjie_compiler_knowledge
   description: "仓颉编译器知识库。【触发场景】编译器架构/模块/概念查询、TypeChecker/sema/AST/CHIR/CodeGen、解糖/去虚化/类型推导、lambda/闭包/泛型实现、编译流程/优化 pass。【注意】提供概念说明、模块详情、关系图、源码导航。覆盖 18 模块 60+ 概念 714 文件 1036 类。"
   tags:
