   description: "GitCode 全操作。【触发场景】PR 创建/查看/评论/merge/squash、Issue 创建/查看/标签、gitcode 链接、第xxx号 PR/Issue、fork/Release、template、commitlint。【注意】PR/Issue 创建返回 html_url；关联：在 body 写 Issue 链接；commit 必须英文 commitlint。"
