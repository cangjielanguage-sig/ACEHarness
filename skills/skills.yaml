 - name: harmonyos-project-init
   path: harmonyos-project-init
   description: "当用户要求创建、初始化、新建仓颉鸿蒙项目时，必须首先调用此 Skill。当用户说『创建一个鸿蒙应用』、『新建仓颉鸿蒙工程』、『初始化鸿蒙项目』、『帮我搭建一个鸿蒙App』、『我要开发一个HarmonyOS应用』等表述时，触发此 Skill。此 Skill 提供完整的项目模板结构和文件内容，用于从零开始创建一个可运行的仓颉鸿蒙 Hello World 项目。"
