<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ACEHarness 核心能力 Feature Table</title>
  <desc id="desc">以表格形式展示 ACEHarness 的六项核心能力，包括对抗式迭代、状态机引擎、Supervisor 路由、Human-in-the-Loop、对话式创建和智能分析。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="58%" stop-color="#101a34"/>
      <stop offset="100%" stop-color="#1b1230"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0a1020" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="headerFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16243f"/>
      <stop offset="100%" stop-color="#0f1b33"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="220" cy="150" r="240" fill="url(#glowBlue)"/>
  <circle cx="1380" cy="860" r="260" fill="url(#glowPink)"/>
  <path d="M0 182C250 108 420 268 662 252C924 234 1098 110 1600 186V0H0Z" fill="#ffffff" fill-opacity="0.03"/>

  <text x="80" y="92" fill="#93c5fd" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="4">ACEHARNESS</text>
  <text x="80" y="148" fill="#f8fafc" font-size="42" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">核心能力 Feature Table</text>
  <text x="80" y="190" fill="#cbd5e1" font-size="17" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">把多 Agent 协作、状态机流程控制、人工审批与结果分析收拢成一张可直接放进 README 的总览图。</text>

  <g font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="600">
    <rect x="80" y="220" width="168" height="42" rx="21" fill="#1d4ed8" fill-opacity="0.18" stroke="#60a5fa"/>
    <text x="164" y="247" text-anchor="middle" fill="#dbeafe">17+ 专业 Agent</text>
    <rect x="264" y="220" width="170" height="42" rx="21" fill="#15803d" fill-opacity="0.18" stroke="#4ade80"/>
    <text x="349" y="247" text-anchor="middle" fill="#dcfce7">70+ 对话指令</text>
    <rect x="450" y="220" width="166" height="42" rx="21" fill="#7c3aed" fill-opacity="0.18" stroke="#a78bfa"/>
    <text x="533" y="247" text-anchor="middle" fill="#ede9fe">50+ API 端点</text>
    <rect x="632" y="220" width="154" height="42" rx="21" fill="#b45309" fill-opacity="0.18" stroke="#fbbf24"/>
    <text x="709" y="247" text-anchor="middle" fill="#fef3c7">3 执行引擎</text>
    <rect x="802" y="220" width="168" height="42" rx="21" fill="#be185d" fill-opacity="0.18" stroke="#f9a8d4"/>
    <text x="886" y="247" text-anchor="middle" fill="#fce7f3">6 可视化视图</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="292" width="1440" height="608" rx="30" fill="url(#panelFill)" stroke="#334155" stroke-width="1.2"/>
    <rect x="80" y="292" width="1440" height="72" rx="30" fill="url(#headerFill)"/>
    <rect x="80" y="334" width="1440" height="566" fill="#0a1120" fill-opacity="0.22"/>

    <line x1="400" y1="292" x2="400" y2="900" stroke="#233047"/>
    <line x1="880" y1="292" x2="880" y2="900" stroke="#233047"/>
    <line x1="1270" y1="292" x2="1270" y2="900" stroke="#233047"/>
    <line x1="80" y1="364" x2="1520" y2="364" stroke="#334155"/>
    <line x1="80" y1="458" x2="1520" y2="458" stroke="#1f2a3a"/>
    <line x1="80" y1="552" x2="1520" y2="552" stroke="#1f2a3a"/>
    <line x1="80" y1="646" x2="1520" y2="646" stroke="#1f2a3a"/>
    <line x1="80" y1="740" x2="1520" y2="740" stroke="#1f2a3a"/>
    <line x1="80" y1="834" x2="1520" y2="834" stroke="#1f2a3a"/>

    <text x="112" y="338" fill="#cbd5e1" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">核心能力</text>
    <text x="432" y="338" fill="#cbd5e1" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">设计要点</text>
    <text x="912" y="338" fill="#cbd5e1" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">直接价值</text>
    <text x="1302" y="338" fill="#cbd5e1" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">代表指标</text>

    <rect x="80" y="364" width="1440" height="94" fill="#0f172a" fill-opacity="0.66"/>
    <rect x="80" y="458" width="1440" height="94" fill="#0b1220" fill-opacity="0.72"/>
    <rect x="80" y="552" width="1440" height="94" fill="#0f172a" fill-opacity="0.66"/>
    <rect x="80" y="646" width="1440" height="94" fill="#0b1220" fill-opacity="0.72"/>
    <rect x="80" y="740" width="1440" height="94" fill="#0f172a" fill-opacity="0.66"/>
    <rect x="80" y="834" width="1440" height="66" fill="#0b1220" fill-opacity="0.72"/>

    <g font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
      <rect x="80" y="364" width="8" height="94" fill="#ef4444"/>
      <circle cx="118" cy="404" r="8" fill="#ef4444"/>
      <text x="140" y="392" fill="#fca5a5" font-size="12" font-weight="700" letter-spacing="1.2">ADVERSARIAL</text>
      <text x="140" y="420" fill="#f8fafc" font-size="24" font-weight="700">对抗式迭代</text>
      <text x="432" y="396" fill="#cbd5e1" font-size="15">
        <tspan x="432" dy="0">Defender / Attacker / Judge 三角闭环，</tspan>
        <tspan x="432" dy="24">结构化 verdict 驱动自动收敛</tspan>
      </text>
      <text x="912" y="396" fill="#94a3b8" font-size="15">
        <tspan x="912" dy="0">避免一次误判固化进代码，复杂问题</tspan>
        <tspan x="912" dy="24">可在多轮挑战后稳定收敛</tspan>
      </text>
      <rect x="1302" y="382" width="178" height="34" rx="17" fill="#ef4444" fill-opacity="0.14" stroke="#f87171" stroke-opacity="0.56"/>
      <text x="1391" y="404" text-anchor="middle" fill="#fecaca" font-size="14" font-weight="700">17+ 专业 Agent</text>

      <rect x="80" y="458" width="8" height="94" fill="#8b5cf6"/>
      <circle cx="118" cy="498" r="8" fill="#8b5cf6"/>
      <text x="140" y="486" fill="#c4b5fd" font-size="12" font-weight="700" letter-spacing="1.2">STATE MACHINE</text>
      <text x="140" y="514" fill="#f8fafc" font-size="24" font-weight="700">状态机引擎</text>
      <text x="432" y="490" fill="#cbd5e1" font-size="15">
        <tspan x="432" dy="0">条件跳转、自动回退、最大转移保护、</tspan>
        <tspan x="432" dy="24">崩溃恢复共同组成非线性流程控制</tspan>
      </text>
      <text x="912" y="490" fill="#94a3b8" font-size="15">
        <tspan x="912" dy="0">比线性流水线更适合复杂修复路径，</tspan>
        <tspan x="912" dy="24">能在反复试错中继续推进</tspan>
      </text>
      <rect x="1302" y="476" width="164" height="34" rx="17" fill="#8b5cf6" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.56"/>
      <text x="1384" y="498" text-anchor="middle" fill="#ddd6fe" font-size="14" font-weight="700">ICE 回退 3 次</text>

      <rect x="80" y="552" width="8" height="94" fill="#06b6d4"/>
      <circle cx="118" cy="592" r="8" fill="#06b6d4"/>
      <text x="140" y="580" fill="#a5f3fc" font-size="12" font-weight="700" letter-spacing="1.2">SUPERVISOR</text>
      <text x="140" y="608" fill="#f8fafc" font-size="24" font-weight="700">Supervisor 路由</text>
      <text x="432" y="584" fill="#cbd5e1" font-size="15">
        <tspan x="432" dy="0">关键词直达 + 轻量 LLM 语义匹配 +</tspan>
        <tspan x="432" dy="24">用户兜底，路由逻辑与业务执行分离</tspan>
      </text>
      <text x="912" y="584" fill="#94a3b8" font-size="15">
        <tspan x="912" dy="0">Agent 只声明信息缺口，不必知道团队</tspan>
        <tspan x="912" dy="24">成员列表，信息流不再受固定顺序限制</tspan>
      </text>
      <rect x="1302" y="570" width="170" height="34" rx="17" fill="#06b6d4" fill-opacity="0.14" stroke="#67e8f9" stroke-opacity="0.56"/>
      <text x="1387" y="592" text-anchor="middle" fill="#cffafe" font-size="14" font-weight="700">约 $0.001 / 次</text>

      <rect x="80" y="646" width="8" height="94" fill="#f59e0b"/>
      <circle cx="118" cy="686" r="8" fill="#f59e0b"/>
      <text x="140" y="674" fill="#fde68a" font-size="12" font-weight="700" letter-spacing="1.2">HUMAN-IN-THE-LOOP</text>
      <text x="140" y="702" fill="#f8fafc" font-size="24" font-weight="700">Human-in-the-Loop</text>
      <text x="432" y="678" fill="#cbd5e1" font-size="15">
        <tspan x="432" dy="0">审批门、反馈注入、强制跳转三种机制</tspan>
        <tspan x="432" dy="24">把人工判断嵌进自动化执行路径</tspan>
      </text>
      <text x="912" y="678" fill="#94a3b8" font-size="15">
        <tspan x="912" dy="0">关键节点保留人工控制，不牺牲执行</tspan>
        <tspan x="912" dy="24">效率，也避免高风险操作失控</tspan>
      </text>
      <rect x="1302" y="664" width="190" height="34" rx="17" fill="#f59e0b" fill-opacity="0.14" stroke="#fbbf24" stroke-opacity="0.56"/>
      <text x="1397" y="686" text-anchor="middle" fill="#fef3c7" font-size="14" font-weight="700">关键决策可接管</text>

      <rect x="80" y="740" width="8" height="94" fill="#22c55e"/>
      <circle cx="118" cy="780" r="8" fill="#22c55e"/>
      <text x="140" y="768" fill="#bbf7d0" font-size="12" font-weight="700" letter-spacing="1.2">CHAT-DRIVEN</text>
      <text x="140" y="796" fill="#f8fafc" font-size="24" font-weight="700">对话式创建</text>
      <text x="432" y="772" fill="#cbd5e1" font-size="15">
        <tspan x="432" dy="0">70+ 指令覆盖创建、修改、启动、提交</tspan>
        <tspan x="432" dy="24">等完整流程，并按风险等级分级确认</tspan>
      </text>
      <text x="912" y="772" fill="#94a3b8" font-size="15">
        <tspan x="912" dy="0">一句话就能搭工作流和 Agent 配置，</tspan>
        <tspan x="912" dy="24">把复杂编排压缩成自然语言交互</tspan>
      </text>
      <rect x="1302" y="758" width="178" height="34" rx="17" fill="#22c55e" fill-opacity="0.14" stroke="#4ade80" stroke-opacity="0.56"/>
      <text x="1391" y="780" text-anchor="middle" fill="#dcfce7" font-size="14" font-weight="700">70+ 对话指令</text>

      <rect x="80" y="834" width="8" height="66" fill="#ec4899"/>
      <circle cx="118" cy="867" r="8" fill="#ec4899"/>
      <text x="140" y="856" fill="#f9a8d4" font-size="12" font-weight="700" letter-spacing="1.2">ANALYTICS</text>
      <text x="140" y="882" fill="#f8fafc" font-size="24" font-weight="700">智能分析</text>
      <text x="432" y="868" fill="#cbd5e1" font-size="15">回归判定、回退热点、Token 成本追踪、Prompt 质量评估</text>
      <text x="912" y="868" fill="#94a3b8" font-size="15">执行结束后仍可量化分析结果，便于优化、复盘和成本治理</text>
      <rect x="1302" y="850" width="154" height="34" rx="17" fill="#ec4899" fill-opacity="0.14" stroke="#f9a8d4" stroke-opacity="0.56"/>
      <text x="1379" y="872" text-anchor="middle" fill="#fce7f3" font-size="14" font-weight="700">O0 / O1 / O2</text>
    </g>
  </g>
</svg>
