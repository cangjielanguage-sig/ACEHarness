<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">OpenHarmony 仓颉迁移</title>
  <desc id="desc">展示 AceHarness 在 OpenHarmony 仓颉迁移场景中的生产级状态机、技能注入、构建脚本和人工审批机制。</desc>
  <defs>
    <linearGradient id="bgOhos" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="55%" stop-color="#1b1d31"/>
      <stop offset="100%" stop-color="#2a150d"/>
    </linearGradient>
    <linearGradient id="lineOhos" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadowOhos" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrowOhos" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1600" height="860" fill="url(#bgOhos)"/>
  <circle cx="1320" cy="120" r="190" fill="#f59e0b" fill-opacity="0.14"/>
  <circle cx="280" cy="760" r="220" fill="#38bdf8" fill-opacity="0.12"/>

  <text x="92" y="88" fill="#fcd34d" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="3">OHOS MIGRATION</text>
  <text x="92" y="142" fill="#f8fafc" font-size="46" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">OpenHarmony 仓颉迁移</text>
  <text x="92" y="182" fill="#cbd5e1" font-size="18" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">这不是普通流水线，而是可回退、可注入技能、可挂构建脚本、可加人工审批的生产级迁移工作流。</text>

  <g filter="url(#shadowOhos)">
    <rect x="92" y="226" width="316" height="106" rx="24" fill="#2b1b08" stroke="#f59e0b"/>
    <text x="122" y="264" fill="#fde68a" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">SKILL INJECTION</text>
    <text x="122" y="288" fill="#fff7ed" font-size="18" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
      <tspan x="122" y="288">ohos-cangjie-analyst-</tspan>
      <tspan x="122" dy="26">skill</tspan>
    </text>

    <rect x="430" y="226" width="286" height="106" rx="24" fill="#2b1b08" stroke="#f59e0b"/>
    <text x="460" y="264" fill="#fde68a" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">PRE-COMMANDS</text>
    <text x="460" y="302" fill="#fff7ed" font-size="22" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">构建脚本预执行</text>

    <rect x="738" y="226" width="258" height="106" rx="24" fill="#10261a" stroke="#22c55e"/>
    <text x="768" y="264" fill="#bbf7d0" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">OUTPUTS</text>
    <text x="768" y="302" fill="#f0fdf4" font-size="22" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">结构化报告归档</text>

    <rect x="1018" y="226" width="490" height="106" rx="24" fill="#0b1223" stroke="#38bdf8"/>
    <text x="1048" y="264" fill="#bae6fd" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">HUMAN-IN-THE-LOOP</text>
    <text x="1048" y="288" fill="#f8fafc" font-size="18" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
      <tspan x="1048" y="288">架构设计阶段设置人工审批门，</tspan>
      <tspan x="1048" dy="26">避免迁移方向跑偏</tspan>
    </text>
  </g>

  <rect x="74" y="388" width="1452" height="286" rx="36" fill="#0f172a" fill-opacity="0.68" stroke="#475569"/>

  <g filter="url(#shadowOhos)">
    <rect x="106" y="490" width="196" height="92" rx="24" fill="#0b1223" stroke="#fbbf24" stroke-width="2"/>
    <text x="138" y="528" fill="#fde68a" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">STATE 01</text>
    <text x="138" y="566" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">API Gap 分析</text>

    <rect x="352" y="490" width="196" height="92" rx="24" fill="#0b1223" stroke="#fbbf24" stroke-width="2"/>
    <text x="384" y="528" fill="#fde68a" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">STATE 02</text>
    <text x="384" y="566" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">架构设计</text>

    <rect x="598" y="490" width="196" height="92" rx="24" fill="#0b1223" stroke="#38bdf8" stroke-width="2"/>
    <text x="630" y="528" fill="#bae6fd" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">STATE 03</text>
    <text x="630" y="566" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">代码实现</text>

    <rect x="844" y="490" width="196" height="92" rx="24" fill="#2a1013" stroke="#ef4444" stroke-width="2"/>
    <text x="876" y="528" fill="#fecaca" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">STATE 04</text>
    <text x="876" y="566" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">红队审查</text>

    <rect x="1090" y="490" width="196" height="92" rx="24" fill="#10261a" stroke="#22c55e" stroke-width="2"/>
    <text x="1122" y="528" fill="#bbf7d0" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">STATE 05</text>
    <text x="1122" y="566" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">最终验证</text>

    <rect x="1336" y="490" width="126" height="92" rx="24" fill="#22133d" stroke="#a78bfa" stroke-width="2"/>
    <text x="1360" y="528" fill="#ddd6fe" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">DONE</text>
    <text x="1360" y="566" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">完成</text>
  </g>

  <path d="M302 536H352" stroke="url(#lineOhos)" stroke-width="4" marker-end="url(#arrowOhos)"/>
  <path d="M548 536H598" stroke="url(#lineOhos)" stroke-width="4" marker-end="url(#arrowOhos)"/>
  <path d="M794 536H844" stroke="url(#lineOhos)" stroke-width="4" marker-end="url(#arrowOhos)"/>
  <path d="M1040 536H1090" stroke="url(#lineOhos)" stroke-width="4" marker-end="url(#arrowOhos)"/>
  <path d="M1286 536H1336" stroke="url(#lineOhos)" stroke-width="4" marker-end="url(#arrowOhos)"/>

  <path d="M942 610C942 700 450 704 450 594" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrowOhos)"/>
  <text x="700" y="710" fill="#fecaca" font-size="15" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">红队审查未通过，回退到架构设计</text>

  <path d="M1188 610C1188 744 696 748 696 594" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrowOhos)"/>
  <text x="928" y="760" fill="#bbf7d0" font-size="15" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">最终验证失败，回退到代码实现</text>

  <path d="M450 468V372" stroke="#fbbf24" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrowOhos)"/>
  <rect x="352" y="334" width="196" height="58" rx="18" fill="#2b1b08" stroke="#fbbf24"/>
  <text x="388" y="371" fill="#fff7ed" font-size="19" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">人工审批门</text>
</svg>
