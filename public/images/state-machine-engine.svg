<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">状态机工作流引擎</title>
  <desc id="desc">AceHarness 状态机工作流引擎主流程图，展示多路径回退、人工审批和条件跳转。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040b16"/>
      <stop offset="58%" stop-color="#0d1731"/>
      <stop offset="100%" stop-color="#1b1026"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1223"/>
      <stop offset="100%" stop-color="#121c34"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <marker id="warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="fail" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1600" height="720" fill="url(#bg)"/>
  <circle cx="260" cy="120" r="180" fill="#38bdf8" fill-opacity="0.08"/>
  <circle cx="1320" cy="620" r="180" fill="#f59e0b" fill-opacity="0.10"/>

  <text x="120" y="88" fill="#93c5fd" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="3">ACEHARNESS ENGINE</text>
  <text x="120" y="136" fill="#f8fafc" font-size="44" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">状态机工作流引擎</text>
  <text x="120" y="174" fill="#cbd5e1" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">不是线性流水线，而是可以根据 verdict 自动回退、审批、重试与恢复的闭环。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="204" width="190" height="42" rx="16" fill="#0b1223" stroke="#38bdf8"/>
    <text x="146" y="231" fill="#cbd5e1" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">条件跳转 · verdict=fail</text>

    <rect x="332" y="204" width="184" height="42" rx="16" fill="#0b1223" stroke="#38bdf8"/>
    <text x="358" y="231" fill="#cbd5e1" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">最大转移 · 50 次</text>

    <rect x="538" y="204" width="176" height="42" rx="16" fill="#0b1223" stroke="#38bdf8"/>
    <text x="564" y="231" fill="#cbd5e1" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">状态级上下文</text>

    <rect x="736" y="204" width="154" height="42" rx="16" fill="#0b1223" stroke="#38bdf8"/>
    <text x="762" y="231" fill="#cbd5e1" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">断点续跑</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="96" y="278" width="1408" height="306" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="1.5"/>

    <rect x="126" y="368" width="220" height="104" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="156" y="404" fill="#e2e8f0" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">问题复现</text>
    <text x="156" y="432" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">最小用例 / 输入准备</text>

    <rect x="386" y="368" width="220" height="104" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="416" y="404" fill="#e2e8f0" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">根因定位</text>
    <text x="416" y="432" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">挑战 / 判断 / 收敛</text>

    <rect x="646" y="368" width="220" height="104" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="676" y="404" fill="#e2e8f0" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">方案设计</text>
    <text x="676" y="432" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">人工审批门 + 方案背书</text>

    <rect x="976" y="368" width="220" height="104" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="1006" y="404" fill="#e2e8f0" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">代码修复</text>
    <text x="1006" y="432" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Agent 协作执行 / 修订</text>

    <rect x="1236" y="368" width="220" height="104" rx="26" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="1266" y="404" fill="#e2e8f0" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">验证完成</text>
    <text x="1266" y="432" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">SSE 推送 / runs 记录</text>

    <path d="M346 420H386" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M606 420H646" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M866 420H910" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1196 420H1236" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="904" y="398" width="58" height="44" rx="14" fill="#2b1b08" stroke="#f59e0b"/>
    <text x="918" y="425" fill="#fde68a" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">审批</text>

    <path d="M1088 362C1088 286 756 280 756 362" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#warn)"/>
    <text x="880" y="282" fill="#fcd34d" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">审查失败 → 回到方案设计</text>

    <path d="M756 482C756 540 496 540 496 482" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
    <text x="548" y="558" fill="#93c5fd" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">挑战失败 → 回到根因定位</text>

    <path d="M496 362C496 292 236 286 236 362" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#warn)"/>
    <text x="226" y="282" fill="#fcd34d" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Judge fail → 回到问题复现</text>

    <path d="M206 472V532" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#fail)"/>
    <rect x="120" y="540" width="176" height="34" rx="14" fill="#2a1013" stroke="#ef4444"/>
    <text x="144" y="562" fill="#fecaca" font-size="14" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">无法复现 → 失败结束</text>
  </g>
</svg>
