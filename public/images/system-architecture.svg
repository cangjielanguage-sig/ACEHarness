<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1220" role="img" aria-labelledby="title desc">
  <title id="title">AceHarness 系统架构</title>
  <desc id="desc">AceHarness 的三层系统架构，包括前端层、编排层和执行层。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040913"/>
      <stop offset="56%" stop-color="#0f1c38"/>
      <stop offset="100%" stop-color="#160b23"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1223"/>
      <stop offset="100%" stop-color="#121e37"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1600" height="1220" fill="url(#bg)"/>
  <circle cx="260" cy="130" r="180" fill="#2563eb" fill-opacity="0.10"/>
  <circle cx="1320" cy="1080" r="220" fill="#22c55e" fill-opacity="0.10"/>

  <text x="112" y="92" fill="#93c5fd" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="3">ACEFLOW PLATFORM</text>
  <text x="112" y="140" fill="#f8fafc" font-size="44" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">系统架构</text>
  <g filter="url(#shadow)">
    <rect x="96" y="220" width="1408" height="292" rx="36" fill="url(#panel)" stroke="#334155" stroke-width="1.5"/>
    <text x="128" y="266" fill="#e2e8f0" font-size="21" font-weight="600" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">前端层 · Next.js 16</text>

    <rect x="128" y="316" width="228" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="158" y="350" fill="#e0f2fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">对话页</text>
    <text x="158" y="374" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">70+ 动作 / 向导创建 / 风险确认</text>

    <rect x="394" y="316" width="228" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="424" y="350" fill="#e0f2fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">仪表盘</text>
    <text x="424" y="374" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">实时统计 / 趋势 / 最近运行</text>

    <rect x="660" y="316" width="228" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="690" y="350" fill="#e0f2fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">工作台</text>
    <text x="690" y="374" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">运行 / 设计 / 历史 / 状态图</text>

    <rect x="926" y="316" width="228" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="956" y="350" fill="#e0f2fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">定时任务</text>
    <text x="956" y="374" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Cron 调度 / 计划执行 / 测试触发</text>

    <rect x="1192" y="316" width="228" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="1222" y="350" fill="#e0f2fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">API 文档</text>
    <text x="1222" y="374" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">50+ 端点 / 交互式调试 / 示例</text>

    <rect x="250" y="436" width="1100" height="48" rx="18" fill="#111827" stroke="#475569"/>
    <text x="282" y="466" fill="#38bdf8" font-size="15" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">API 路由层</text>
    <text x="430" y="466" fill="#cbd5e1" font-size="13" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">workflow/* · processes/* · configs/* · agents/* · runs/* · schedules/* · chat/* · skills/* · models/* · gitcode/*</text>
  </g>

  <path d="M800 512V552" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="146" y="568" width="1308" height="210" rx="36" fill="url(#panel)" stroke="#334155" stroke-width="1.5"/>
    <text x="178" y="614" fill="#e2e8f0" font-size="21" font-weight="600" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">编排层</text>

    <rect x="178" y="654" width="260" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="208" y="688" fill="#e0e7ff" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Workflow Manager</text>
    <text x="208" y="712" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">阶段式引擎 / 串行与并行步骤编排</text>

    <rect x="486" y="640" width="628" height="104" rx="28" fill="#0f172a" stroke="#22d3ee"/>
    <text x="520" y="676" fill="#e0e7ff" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">StateMachine Workflow Manager</text>
    <text x="520" y="700" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">状态机引擎 / 条件跳转 / 回退控制 / 断点续跑</text>
    <rect x="902" y="654" width="180" height="32" rx="14" fill="#111827" stroke="#475569"/>
    <text x="924" y="675" fill="#cbd5e1" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Supervisor-Lite 路由</text>
    <rect x="902" y="696" width="180" height="32" rx="14" fill="#111827" stroke="#475569"/>
    <text x="924" y="717" fill="#cbd5e1" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">上下文持久化 / 崩溃恢复</text>

    <rect x="1162" y="654" width="260" height="90" rx="24" fill="#0f172a" stroke="#38bdf8"/>
    <text x="1192" y="688" fill="#e0e7ff" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Scheduler</text>
    <text x="1192" y="712" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">node-cron / 周期执行 / 计划任务</text>
  </g>

  <path d="M308 744C308 812 584 832 734 906" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <path d="M800 744V906" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <path d="M1292 744C1292 812 1016 832 866 906" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="520" y="836" width="560" height="352" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="1.5"/>
    <text x="552" y="882" fill="#e2e8f0" font-size="21" font-weight="600" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">执行层</text>

    <rect x="620" y="906" width="360" height="64" rx="20" fill="#0f172a" stroke="#a78bfa"/>
    <text x="648" y="944" fill="#ddd6fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">ProcessManager</text>
    <text x="792" y="944" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">并发控制 / 队列 / 流式输出 / 进程生命周期</text>

    <rect x="650" y="1000" width="300" height="64" rx="22" fill="#0f172a" stroke="#38bdf8"/>
    <text x="678" y="1036" fill="#e0f2fe" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">执行引擎</text>
    <text x="678" y="1057" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Kiro CLI / Claude Code CLI + Skills</text>

    <rect x="650" y="1094" width="300" height="64" rx="22" fill="#0f172a" stroke="#22c55e"/>
    <text x="678" y="1130" fill="#dcfce7" font-size="16" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">AI 服务</text>
    <text x="678" y="1151" fill="#94a3b8" font-size="12" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">Claude / OpenAI / 兼容模型</text>
  </g>

  <path d="M800 970V1000" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <path d="M800 1064V1094" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
</svg>
