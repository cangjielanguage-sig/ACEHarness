# ACEHarness Skills 配置
# 描述所有可用的 skills，每个 skill 对应 .claude/skills/ 下的一个目录

skills:
 - name: build-cangjie
   path: build-cangjie
   description: "仓颉编译器构建。【触发场景】build/编译 cjc/runtime/stdlib/stdx/cjpm/cjfmt/cjlint/cjcov/cjlsp、搭建编译环境、重新编译、用 cjc 编译。【注意】首次构建需完整步骤：1) 依次构建 runtime+stdlib+stdx 并 install；2) source output/envsetup.sh；3) 验证：cjc hello.cj。后续增量编译只需 ninja cjc。输出在 cangjie_compiler/output/。支持 linux/mac x86_64/aarch64。"
   tags:
     - 构建
     - 编译器
     - 仓颉
     - 工具链
   platforms:
     - linux_x86_64
     - linux_aarch64
     - mac_x86_64
     - mac_aarch64
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: run-cangjie-tests
   path: run-cangjie-tests
   description: "仓颉测试用例执行。【触发场景】test case/测试用例、testsuite/testlist、HLT/LLT/cjcov/LSP。【注意】依赖 CANGJIE_HOME 环境变量。参数：-j 并行、--timeout 超时、-pFAIL 只显失败、--retry 重试、--fail_exit 失败退码。"
   tags:
     - 测试
     - 编译器
     - 仓颉
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: profile-cangjie
   path: profile-cangjie
   description: "仓颉编译器性能分析。【触发场景】profile-compile-time、profile-compile-memory、.prof 报告、编译瓶颈。【注意】需先构建 compiler，直接用 --profile 标志无需重编译。"
   tags:
     - 性能分析
     - 编译器
     - 仓颉
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: cangjie_compiler_knowledge
   path: cangjie_compiler_knowledge
   description: "仓颉编译器代码知识库检索。【触发场景】TypeChecker/sema/AST2CHIR/AST2CHIRBuilder、CHIR 优化 pass、解糖去虚化、Devirtualization 在哪、目录在哪。【注意】用于源码导航，搜类/函数/文件位置。覆盖 18 模块 714 文件 1036 类。"
   tags:
     - 知识库
     - 文档
     - 仓颉
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: power-gitcode
   path: power-gitcode
   description: "GitCode 全操作。【触发场景】PR 创建/查看/评论/merge/squash、Issue 创建/查看/标签、gitcode 链接、第xxx号 PR/Issue、fork/Release、template、commitlint。【注意】PR/Issue 创建返回 html_url；关联：在 body 写 Issue 链接；commit 必须英文 commitlint。"
   tags:
     - GitCode
     - PR管理
     - Issue
     - 仓库管理
     - commit
   platforms:
     - linux_x86_64
     - linux_aarch64
     - mac_x86_64
     - mac_aarch64
   version: "2.0.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: aceharness-chat-card
   path: aceharness-chat-card
   description: "可视化卡片渲染。【触发场景】用卡片显示、做个卡片展示、生成可视化卡片/PR 卡片/Issue 卡片/card/tabs/badge/徽章/进度条/header/info 行。【注意】无需说 ACEHarness，看到卡片需求即触发。输出 card JSON 代码块，支持头部/键值对/徽章/badge/代码块/进度条/tabs/badges/折叠区。"
   tags:
     - 卡片
     - UI
     - 对话
     - 可视化
   platforms:
     - linux_x86_64
     - linux_aarch64
     - mac_x86_64
     - mac_aarch64
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

 - name: aceharness-workflow-creator
   path: aceharness-workflow-creator
   description: "ACEHarness 工作流配置文件创建技能。【触发场景】每当用户提到：创建工作流、配置 workflow、新建工作流、写工作流配置、设置 agent 执行流程、state-machine/phase-based 工作流。生成前必须用验证脚本校验 YAML 格式和 agent 引用有效性，不要跳过验证直接生成。"
   tags:
     - 工作流
     - 配置
     - 创建
     - 对话
   version: "1.1.0"
   updatedAt: "2026-03-25"
   contributors:
     - zichexuelan

