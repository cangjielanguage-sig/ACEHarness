<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Issue 746 自动闭环</title>
  <desc id="desc">展示 AceFlow 在 Issue 746 中从问题复现到自动测试、提交 MR 和门禁流水线的端到端自动闭环。</desc>
