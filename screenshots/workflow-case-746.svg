    <rect x="1218" y="458" width="220" height="86" rx="22" fill="#0b1223" stroke="#a78bfa" stroke-width="2"/>
    <text x="1254" y="492" fill="#ddd6fe" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">STATE 05</text>
    <text x="1254" y="528" fill="#f8fafc" font-size="23" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">验证完成</text>
