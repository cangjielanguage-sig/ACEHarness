  <text x="90" y="142" fill="#f8fafc" font-size="46" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">从分析到门禁的全自动闭环</text>
  <text x="90" y="182" fill="#cbd5e1" font-size="18" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">核心修复状态负责收敛问题，自动化轨道负责接管测试设计、相关用例发现、MR 交付与门禁验证。</text>

