    <linearGradient id="bg746" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1120"/>
      <stop offset="55%" stop-color="#151a3b"/>
      <stop offset="100%" stop-color="#210d34"/>
    </linearGradient>
    <linearGradient id="auto746" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#65a30d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow746" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow746" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAuto746" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#84cc16"/>
